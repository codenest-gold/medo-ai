<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDO AI - ULTIMATE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508; --surface: #0f0f15; --primary: #8b5cf6; --accent: #fbbf24; --text: #ffffff; --border: rgba(139, 92, 246, 0.3);
        }

        /* 16 ثيم طرش */
        body.theme-1 { --bg: #050508; --primary: #8b5cf6; --pattern: radial-gradient(#8b5cf61a 1px, transparent 1px); }
        body.theme-2 { --bg: #000800; --primary: #00ff41; --pattern: linear-gradient(rgba(0,255,65,0.05) 1px, transparent 1px); }
        body.theme-3 { --bg: #0a001a; --primary: #ff00ff; --pattern: repeating-linear-gradient(45deg, #ff00ff05 0px, #ff00ff05 10px, transparent 10px, transparent 20px); }
        body.theme-4 { --bg: #000814; --primary: #0088ff; --pattern: radial-gradient(circle, #0088ff10 0%, transparent 70%); }
        body.theme-5 { --bg: #0f0500; --primary: #ff4400; --pattern: linear-gradient(30deg, #ff440005 12%, transparent 12.5%); }
        body.theme-6 { --bg: #140f00; --primary: #ffd700; --pattern: radial-gradient(circle, #ffd70010 1px, transparent 1px); }
        body.theme-7 { --bg: #001111; --primary: #00ffff; --pattern: linear-gradient(90deg, #00ffff05 1px, transparent 1px); }
        body.theme-8 { --bg: #1a0000; --primary: #ff0000; --pattern: radial-gradient(#ff000010 2px, transparent 2px); }
        body.theme-9 { --bg: #051a05; --primary: #adff2f; --pattern: repeating-radial-gradient(#adff2f05 0, #adff2f05 5px, transparent 5px, transparent 10px); }
        body.theme-10{ --bg: #1a1a00; --primary: #ffff00; --pattern: linear-gradient(#ffff0005 1px, transparent 1px); }
        body.theme-11{ --bg: #00001a; --primary: #4169e1; --pattern: radial-gradient(circle at 50% 50%, #4169e110 0%, transparent 50%); }
        body.theme-12{ --bg: #1a000d; --primary: #ff69b4; --pattern: repeating-linear-gradient(-45deg, #ff69b405 0px, transparent 10px); }
        body.theme-13{ --bg: #140a00; --primary: #d2691e; --pattern: radial-gradient(circle, #d2691e10 1px, transparent 1px); }
        body.theme-14{ --bg: #0a0a0a; --primary: #c0c0c0; --pattern: linear-gradient(45deg, #c0c0c005 25%, transparent 25%); }
        body.theme-15{ --bg: #1a0800; --primary: #ff8c00; --pattern: radial-gradient(#ff8c0010 1px, transparent 1px); }
        body.theme-16{ --bg: #000000; --primary: #ffffff; --pattern: radial-gradient(circle, #ffffff10 1px, transparent 1px); }

        /* التعديل الجوهري هنا لضبط الطول على الموبايل */
        html, body { 
            height: 100vh;
            height: 100dvh; /* الطول الديناميكي للموبايل */
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: var(--bg);
            background-size: 30px 30px;
            background-image: var(--pattern);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; transition: background-color 0.3s, border-color 0.3s; }

        .app-container { 
            display: flex; 
            height: 100dvh; 
            width: 100vw; 
            overflow: hidden; 
        }
        
        /* Sidebar */
        .sidebar { width: 300px; background: rgba(15,15,21,0.95); backdrop-filter: blur(10px); border-left: 2px solid var(--border); display: flex; flex-direction: column; padding: 15px; z-index: 100; transition: transform 0.3s ease-in-out; }
        
        @media (max-width: 900px) { 
            .sidebar { position: fixed; right: 0; top: 0; bottom: 0; transform: translateX(100%); width: 80%; } 
            .sidebar.active { transform: translateX(0); }
        }

        .brand h1 { font-size: 28px; color: var(--primary); text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px var(--primary); font-weight: 900; }
        .btn-primary { background: var(--primary); color: #fff; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.2s; }
        
        .chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--text); }
        .chat-item.active { border-color: var(--primary); background: rgba(139, 92, 246, 0.2); }
        .del-btn { background: none; border: none; color: #ff4444; font-size: 16px; cursor: pointer; opacity: 0.6; }

        /* Main Chat */
        .main-chat { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; overflow: hidden; }
        
        .header { flex-shrink: 0; height: 60px; background: rgba(15,15,21,0.85); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 50; }
        
        .chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.5; animation: pop 0.3s ease; word-wrap: break-word; }
        @keyframes pop { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .bot { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; border-bottom-right-radius: 4px; color: var(--text); }
        .user { background: linear-gradient(135deg, var(--primary), rgba(139,92,246,0.6)); align-self: flex-end; border-bottom-left-radius: 4px; color: #fff; }

        /* منطقة الكتابة - مثبتة بالأسفل */
        .footer-area { flex-shrink: 0; padding: 12px 15px; background: var(--bg); border-top: 1px solid var(--border); z-index: 50; }
        .input-bar { background: rgba(25, 25, 37, 1); border: 2px solid var(--border); border-radius: 15px; padding: 5px 12px; display: flex; align-items: center; gap: 10px; }
        textarea { flex: 1; background: transparent; border: none; color: #fff; resize: none; outline: none; font-size: 15px; padding: 8px 0; max-height: 100px; }
        .send-btn { background: var(--primary); width: 40px; height: 40px; border-radius: 12px; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--surface); width: 100%; max-width: 500px; padding: 20px; border-radius: 20px; border: 2px solid var(--primary); max-height: 80vh; overflow-y: auto; }
        
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 15px; }
        .theme-card { padding: 12px 5px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; text-align: center; font-weight: bold; font-size: 12px; }

        .icon-btn { font-size: 20px; cursor: pointer; background: none; border: none; color: var(--text); padding: 5px; }
        #typing { color: var(--primary); font-size: 12px; margin: 5px 25px; display: none; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="theme-1">

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="brand"><h1>MIDO AI</h1></div>
        <button class="btn-primary" onclick="createNewChat()">+ محادثة جديدة</button>
        <div class="chat-history" id="chat-history"></div>
        <button class="btn-primary" style="margin-top: 10px; background: rgba(255,255,255,0.05);" onclick="openThemes()">🎨 المعرض الملكي</button>
    </aside>

    <main class="main-chat">
        <header class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="icon-btn" onclick="toggleSidebar()">☰</button>
                <h2 id="current-title" style="font-size: 16px; color: var(--primary); margin: 0;">ميدو</h2>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="icon-btn" onclick="openTeach()" title="علم ميدو">🤡</button>
            </div>
        </header>

        <div class="chat-window" id="chat-win"></div>
        <div id="typing">ميدو بيكتب...</div>

        <footer class="footer-area">
            <div class="input-bar">
                <textarea id="msg-input" placeholder="اكتب رسالتك يا برنس..." rows="1" oninput="autoHeight(this)"></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </footer>
    </main>
</div>

<div id="theme-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="text-align: center; color: var(--primary); font-size: 18px;">المعرض الملكي (16 ثيم)</h2>
        <div class="theme-grid" id="theme-grid"></div>
    </div>
</div>

<div id="teach-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 15px;">🤡 غسيل مخ لميدو</h2>
        <input type="text" id="teach-q" style="width: 100%; background: #1a1a25; border: 1px solid var(--border); padding: 10px; border-radius: 10px; color: #fff; margin-bottom: 10px;" placeholder="لو قلتلك كذا...">
        <textarea id="teach-a" style="width: 100%; background: #1a1a25; border: 1px solid var(--border); padding: 10px; border-radius: 10px; color: #fff; margin-bottom: 10px;" rows="3" placeholder="ميدو يرد يقول..."></textarea>
        <button class="btn-primary" style="width: 100%;" onclick="saveMemory()">حفظ في الذاكرة</button>
    </div>
</div>

<script>
    let db;
    let currentChatId = null;
    let currentMessages = [];
    let brainMemory = [];

    const request = indexedDB.open("MidoProDB", 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains('chats')) db.createObjectStore('chats', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('brain')) db.createObjectStore('brain', { keyPath: 'q' });
        if (!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'key' });
    };
    request.onsuccess = (e) => { db = e.target.result; initApp(); };

    function initApp() {
        db.transaction("config").objectStore("config").get("theme").onsuccess = (e) => {
            if(e.target.result) document.body.className = e.target.result.value;
        };
        loadBrain();
        renderThemeCards();
        loadAllChats();
    }

    function loadAllChats() {
        const tx = db.transaction("chats", "readonly");
        tx.objectStore("chats").getAll().onsuccess = (e) => {
            const chats = e.target.result.sort((a, b) => b.id - a.id);
            renderHistoryUI(chats);
            if(chats.length > 0) openChat(chats[0].id, chats[0].title, chats[0].messages);
            else createNewChat();
        };
    }

    function renderHistoryUI(chats) {
        const historyDiv = document.getElementById('chat-history');
        historyDiv.innerHTML = '';
        chats.forEach(c => {
            const div = document.createElement('div');
            div.className = `chat-item ${c.id === currentChatId ? 'active' : ''}`;
            div.innerHTML = `<span style="overflow:hidden; text-overflow:ellipsis;">${c.title}</span> <button class="del-btn" onclick="deleteChat(${c.id}, event)">🗑️</button>`;
            div.onclick = () => openChat(c.id, c.title, c.messages);
            historyDiv.appendChild(div);
        });
    }

    function createNewChat() {
        currentChatId = Date.now();
        currentMessages = [{ text: "أهلاً بك يا بطل! أنا ميدو، اؤمرني.", type: 'bot' }];
        saveCurrentChat("محادثة جديدة");
        openChat(currentChatId, "محادثة جديدة", currentMessages);
    }

    function openChat(id, title, msgs) {
        currentChatId = id;
        currentMessages = msgs || [];
        document.getElementById('current-title').innerText = title;
        const win = document.getElementById('chat-win');
        win.innerHTML = '';
        currentMessages.forEach(m => appendBubbleUI(m.text, m.type));
        if(window.innerWidth <= 900) document.getElementById('sidebar').classList.remove('active');
    }

    function saveCurrentChat(title) {
        if(!currentChatId) return;
        const tx = db.transaction("chats", "readwrite");
        tx.objectStore("chats").put({ id: currentChatId, title: title, messages: currentMessages });
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;
        currentMessages.push({ text: text, type: 'user' });
        appendBubbleUI(text, 'user');
        input.value = '';
        input.style.height = 'auto';
        let chatTitle = document.getElementById('current-title').innerText;
        if(currentMessages.length <= 2) chatTitle = text.substring(0, 20);
        saveCurrentChat(chatTitle);
        document.getElementById('typing').style.display = 'block';
        const learned = brainMemory.find(m => text.toLowerCase().includes(m.q));
        if(learned) {
            setTimeout(() => replyBot(learned.a, chatTitle), 500);
        } else {
            try {
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?model=openai`);
                const botText = await res.text();
                replyBot(botText, chatTitle);
            } catch(e) { replyBot("السيرفر هنيج يا زميلي!", chatTitle); }
        }
    }

    function replyBot(text, title) {
        document.getElementById('typing').style.display = 'none';
        currentMessages.push({ text: text, type: 'bot' });
        appendBubbleUI(text, 'bot');
        saveCurrentChat(title);
        const tx = db.transaction("chats", "readonly");
        tx.objectStore("chats").getAll().onsuccess = (e) => renderHistoryUI(e.target.result.sort((a,b)=>b.id-a.id));
    }

    function appendBubbleUI(text, type) {
        const win = document.getElementById('chat-win');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function loadBrain() { db.transaction("brain").objectStore("brain").getAll().onsuccess = (e) => brainMemory = e.target.result; }
    function saveMemory() {
        const q = document.getElementById('teach-q').value.trim().toLowerCase();
        const a = document.getElementById('teach-a').value.trim();
        if(!q || !a) return;
        const tx = db.transaction("brain", "readwrite");
        tx.objectStore("brain").put({q, a});
        tx.oncomplete = () => { document.getElementById('teach-modal').style.display = 'none'; loadBrain(); };
    }

    const themesData = [
        {id: 1, n: "بنفسجي ملكي", c: "#8b5cf6"}, {id: 2, n: "ماتريكس", c: "#00ff41"},
        {id: 3, n: "سايبر بينك", c: "#ff00ff"}, {id: 4, n: "محيط عميق", c: "#0088ff"},
        {id: 5, n: "بركان ثائر", c: "#ff4400"}, {id: 6, n: "ذهب خالص", c: "#ffd700"},
        {id: 7, n: "ثلج سيان", c: "#00ffff"}, {id: 8, n: "قمر دموي", c: "#ff0000"},
        {id: 9, n: "أخضر سام", c: "#adff2f"}, {id: 10, n: "كهرباء", c: "#ffff00"},
        {id: 11, n: "منتصف الليل", c: "#4169e1"},{id: 12, n: "ساكورا", c: "#ff69b4"},
        {id: 13, n: "قهوة عربي", c: "#d2691e"}, {id: 14, n: "فارس فضي", c: "#c0c0c0"},
        {id: 15, n: "نيون أورانج", c: "#ff8c00"},{id: 16, n: "فضاء مظلم", c: "#ffffff"}
    ];

    function renderThemeCards() {
        const grid = document.getElementById('theme-grid');
        themesData.forEach(t => {
            const card = document.createElement('div');
            card.className = "theme-card"; card.style.borderColor = t.c; card.style.color = t.c; card.innerHTML = t.n;
            card.onclick = () => {
                document.body.className = `theme-${t.id}`;
                db.transaction("config", "readwrite").objectStore("config").put({key: "theme", value: `theme-${t.id}`});
            };
            grid.appendChild(card);
        });
    }

    function autoHeight(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
    function openThemes() { document.getElementById('theme-modal').style.display = 'flex'; }
    function openTeach() { document.getElementById('teach-modal').style.display = 'flex'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function deleteChat(id, e) { e.stopPropagation(); if(confirm("مسح؟")) { db.transaction("chats", "readwrite").delete(id).oncomplete = () => loadAllChats(); } }
    document.getElementById('msg-input').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
</script>
</body>
</html>
