<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medo AI - THE ULTIMATE BOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305; --surface: rgba(15,15,25,0.7); --primary: #7c4dff; --text: #ffffff; --border: rgba(124, 77, 255, 0.3);
            --shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        /* 20 ثيم بستايل Mesh Gradient احترافي */
        body.theme-1 { --bg: #030305; --primary: #7c4dff; } body.theme-2 { --bg: #000800; --primary: #00e676; }
        body.theme-3 { --bg: #080010; --primary: #ff00e6; } body.theme-4 { --bg: #000510; --primary: #0091ea; }
        body.theme-5 { --bg: #0c0200; --primary: #ff3d00; } body.theme-6 { --bg: #080808; --primary: #ffc400; }
        body.theme-7 { --bg: #000a10; --primary: #00e5ff; } body.theme-8 { --bg: #100000; --primary: #ff1744; }
        body.theme-9 { --bg: #000c00; --primary: #b2ff59; } body.theme-10{ --bg: #0e0e00; --primary: #ffee58; }
        body.theme-11{ --bg: #000010; --primary: #2979ff; } body.theme-12{ --bg: #100008; --primary: #f50057; }
        body.theme-13{ --bg: #0c0600; --primary: #ff9100; } body.theme-14{ --bg: #060606; --primary: #bdbdbd; }
        body.theme-15{ --bg: #100400; --primary: #ff6d00; } body.theme-16{ --bg: #000000; --primary: #fafafa; }
        body.theme-17{ --bg: #000800; --primary: #00c853; } body.theme-18{ --bg: #04080c; --primary: #40c4ff; }
        body.theme-19{ --bg: #080210; --primary: #d500f9; } body.theme-20{ --bg: #0e0404; --primary: #f44336; }

        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; }
        
        /* تأثير الجزيئات والـ Blobs (محسنة السرعة) */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -2; opacity: 0.6; filter: blur(4px); }
        .blobs-overlay { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.2; animation: move infinite alternate; will-change: transform; }
        @keyframes move { from { transform: translate(0,0) scale(1); } to { transform: translate(150px, 100px) scale(1.2); } }

        .app-container { 
            display: flex; height: 100dvh; width: 100vw; 
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.4) 100%);
            backdrop-filter: blur(20px);
        }
        
        /* Sidebar */
        .sidebar { width: 320px; background: rgba(0,0,0,0.6); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; z-index: 100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 900px) { .sidebar { position: fixed; right: 0; top: 0; bottom: 0; transform: translateX(100%); width: 85%; } .sidebar.active { transform: translateX(0); } }

        .btn-new { background: linear-gradient(135deg, var(--primary), #4c1d95); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; margin-bottom: 25px; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.4); font-size: 16px; }
        .btn-new:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        
        .history-list { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .chat-item { padding: 15px; margin-bottom: 12px; border-radius: 15px; background: rgba(255,255,255,0.03); cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: 0.3s; }
        .chat-item.active { border-color: var(--primary); background: rgba(124, 77, 255, 0.15); box-shadow: 0 0 20px rgba(124,77,255,0.2); }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); }
        
        .chat-window { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }
        .bubble { max-width: 80%; padding: 20px; border-radius: 25px; line-height: 1.8; position: relative; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: var(--shadow); font-size: 16px; word-wrap: break-word; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--primary), #5a2ab3); border-bottom-left-radius: 5px; color: #fff; font-weight: 700; }
        .bot { align-self: flex-start; background: var(--surface); border-bottom-right-radius: 5px; border-right: 5px solid var(--primary); border-top: 1px solid rgba(255,255,255,0.1); }

        /* Input Area */
        .footer { padding: 30px; background: transparent; }
        .input-box { background: rgba(15,15,30,0.85); border: 2px solid var(--border); border-radius: 35px; padding: 15px 30px; display: flex; align-items: center; box-shadow: var(--shadow); transition: 0.4s; }
        .input-box:focus-within { border-color: var(--primary); box-shadow: 0 0 40px rgba(124, 77, 255, 0.3); }
        textarea { flex: 1; background: transparent; border: none; color: #fff; outline: none; resize: none; font-size: 17px; min-height: 26px; font-family: 'Cairo', sans-serif; }

        /* 3D Theme Cards */
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; padding: 10px; }
        .theme-card { perspective: 1000px; cursor: pointer; }
        .card-inner { background: #0a0a0f; border-radius: 22px; border: 2px solid var(--border); transition: 0.5s; transform-style: preserve-3d; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .theme-card:hover .card-inner { transform: rotateY(15deg) translateY(-10px); border-color: var(--primary); }
        .color-strip { height: 90px; width: 100%; border-bottom: 2px solid var(--border); }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 25px; backdrop-filter: blur(12px); }
        .modal-content { background: #050508; width: 100%; max-width: 650px; padding: 40px; border-radius: 35px; border: 2px solid var(--primary); box-shadow: 0 0 70px var(--primary); max-height: 85vh; overflow-y: auto; scrollbar-width: none; }
        
        .train-input { width: 100%; background: #0d0d0d; border: 2px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; outline: none; font-family: 'Cairo'; }
        
        #typing { font-size: 14px; color: var(--primary); font-weight: 900; margin-bottom: 12px; display: none; padding: 0 35px; }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; background: rgba(0,0,0,0.5); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        th, td { padding: 15px; border: 1px solid var(--border); text-align: right; }
        th { background: var(--primary); color: white; font-weight: 900; }

        /* زر المخفي للتعليم */
        .secret-btn { cursor: pointer; font-size: 22px; opacity: 0.3; transition: 0.3s; }
        .secret-btn:hover { opacity: 1; filter: drop-shadow(0 0 10px var(--primary)); }
    </style>
</head>
<body class="theme-1">

<canvas id="bg-canvas"></canvas>
<div class="blobs-overlay">
    <div class="blob" style="width: 400px; height: 400px; background: var(--primary); top: -10%; left: -5%; animation-duration: 18s;"></div>
    <div class="blob" style="width: 500px; height: 500px; background: #ff00e6; bottom: -10%; right: -5%; animation-duration: 25s; opacity: 0.1;"></div>
</div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <h1 style="text-align:center; color:var(--primary); font-size:38px; font-weight:900; text-shadow: 0 0 20px var(--primary);">Medo AI</h1>
        <button class="btn-new" onclick="createNewChat()">🚀 محادثة جديدة</button>
        <div class="history-list" id="history-list"></div>
        <button class="btn-new" style="background:#1a1a1a; margin-top:20px" onclick="openModal('theme-modal')">🎨 ستايل الواجهة</button>
    </aside>

    <main class="main-content">
        <header class="header">
            <button onclick="document.getElementById('sidebar').classList.toggle('active')" style="background:none; border:none; color:#fff; font-size:30px; cursor:pointer;">☰</button>
            <div style="text-align:center">
                <div id="chat-title" style="font-weight:900; font-size:22px; color: var(--primary);">الروبوت الذكي</div>
                <div style="font-size:12px; opacity:0.7; font-weight: 700;">متصل الآن 🟢</div>
            </div>
            <span onclick="openModal('train-modal')" class="secret-btn">🤡</span>
        </header>

        <div class="chat-window" id="chat-win"></div>
        <div id="typing">Medo AI يفكر بعمق... ✨</div>

        <footer class="footer">
            <div class="input-box">
                <textarea id="user-input" placeholder="اكتب سؤالك لـ Medo AI..." rows="1" oninput="this.style.height='26px';this.style.height=(this.scrollHeight)+'px'"></textarea>
                <button onclick="sendMessage()" style="background:none; border:none; cursor:pointer; font-size:32px; margin-right:15px; color: var(--primary);">🚀</button>
            </div>
        </footer>
    </main>
</div>

<div id="train-modal" class="modal" onclick="closeModal('train-modal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="text-align:center; color:var(--primary); font-weight: 900;">🧠 لوحة التحكم السرية</h2>
        <input type="text" id="train-q" class="train-input" placeholder="السؤال المتوقع...">
        <textarea id="train-a" class="train-input" placeholder="الرد المحفوظ..." rows="4"></textarea>
        <button class="btn-new" style="width:100%" onclick="saveKnowledge()">تخزين في الذاكرة 💾</button>
        <div id="knowledge-list" style="margin-top:25px; max-height:200px; overflow-y:auto;"></div>
    </div>
</div>

<div id="theme-modal" class="modal" onclick="closeModal('theme-modal')">
    <div class="modal-content" style="max-width:850px" onclick="event.stopPropagation()">
        <h2 style="text-align:center; margin-bottom:30px; font-weight: 900; color: var(--primary);">معرض الألوان الفاخرة 🎨</h2>
        <div class="theme-grid" id="theme-grid"></div>
    </div>
</div>

<script>
    let db, currentChatId = null, brainMemory = [];
    const DEV_NUM = "+201124680211";

    const AI_PROMPT = `أنت Medo AI، مساعد ذكي متطور. ردودك يجب أن تكون محادثية، طبيعية، وسلسة جداً. 
تجنب تقسيم الردود لنقاط أو نجوم إلا للضرورة القصوى. لا تستخدم الجداول إلا إذا كان الرد يتضمن مقارنة أرقام أو إحصائيات. 
أجب بشكل متصل ومباشر. مطورك هو ميدو ورقمه ${DEV_NUM}.`;

    const request = indexedDB.open("MedoAI_CoreDB_V2", 1); // تغيير الاسم لضمان بداية نظيفة وسريعة
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore('chats', { keyPath: 'id' });
        db.createObjectStore('brain', { keyPath: 'q' });
        db.createObjectStore('cfg', { keyPath: 'k' });
    };
    request.onsuccess = (e) => { db = e.target.result; init(); };

    function init() {
        db.transaction("cfg").objectStore("cfg").get("theme").onsuccess = (e) => {
            if(e.target.result) document.body.className = e.target.result.v;
        };
        refreshKnowledgeList();
        loadHistory(true);
        renderThemes();
        initCanvas();
    }

    function saveKnowledge() {
        const q = document.getElementById('train-q').value.trim();
        const a = document.getElementById('train-a').value.trim();
        if(!q || !a) return;
        const tx = db.transaction("brain", "readwrite");
        tx.objectStore("brain").put({ q, a });
        tx.oncomplete = () => {
            document.getElementById('train-q').value = '';
            document.getElementById('train-a').value = '';
            refreshKnowledgeList();
        };
    }

    function refreshKnowledgeList() {
        db.transaction("brain").objectStore("brain").getAll().onsuccess = (e) => {
            brainMemory = e.target.result;
            const list = document.getElementById('knowledge-list');
            list.innerHTML = brainMemory.map(item => `
                <div style="font-size:13px; padding:12px; background:rgba(255,255,255,0.03); margin-bottom:8px; border-radius:10px; display:flex; justify-content:space-between; border: 1px solid var(--border);">
                    <span><b>Q:</b> ${item.q}</span>
                    <button onclick="deleteKnowledge('${item.q}')" style="background:none; border:none; color:#f44336; cursor:pointer;">🗑️</button>
                </div>
            `).join('');
        };
    }

    function deleteKnowledge(q) {
        db.transaction("brain", "readwrite").objectStore("brain").delete(q).oncomplete = refreshKnowledgeList;
    }

    function findInBrain(text) {
        const input = text.toLowerCase().trim();
        for (let item of brainMemory) {
            const q = item.q.toLowerCase().trim();
            if (input.includes(q) || q.includes(input)) return item.a;
        }
        return null;
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text || !currentChatId) return;

        appendUI(text, 'user');
        input.value = '';
        input.style.height = '26px';
        document.getElementById('typing').style.display = 'block';

        const saved = findInBrain(text);
        if(saved) {
            setTimeout(() => botRespond(null, saved), 500);
            return;
        }

        if(['مطور', 'رقم', 'صنعك', 'برمجك'].some(k => text.includes(k))) {
            setTimeout(() => botRespond(null, `أهلاً بك! المطور ميدو هو من قام ببرمجتي وتطوير ذكائي، ويمكنك التواصل معه عبر واتساب: ${DEV_NUM}`), 500);
            return;
        }

        db.transaction("chats", "readwrite").objectStore("chats").get(currentChatId).onsuccess = async (e) => {
            let chat = e.target.result;
            if(!chat) return; // حماية إضافية
            chat.msgs.push({ r: 'user', c: text });
            if(chat.title === "محادثة جديدة") chat.title = text.substring(0, 25);

            try {
                const res = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        messages: [{role: 'system', content: AI_PROMPT}, ...chat.msgs.map(m=>({role:m.r==='user'?'user':'assistant', content:m.c}))],
                        model: 'openai'
                    })
                });
                let data = await res.text();
                botRespond(chat, data.replace(/<thought>[\s\S]*?<\/thought>/gi, '').trim());
            } catch { botRespond(chat, "عذراً، واجهت مشكلة في الاتصال بالسحابة."); }
        };
    }

    function botRespond(chat, text) {
        document.getElementById('typing').style.display = 'none';
        appendUI(text, 'bot');
        if(chat) {
            chat.msgs.push({ r: 'bot', c: text });
            db.transaction("chats", "readwrite").objectStore("chats").put(chat).oncomplete = () => loadHistory(false);
        }
    }

    function appendUI(text, type) {
        const win = document.getElementById('chat-win');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        
        if (text.includes('|') && text.includes('-|')) {
            const rows = text.split('\n').filter(r => r.includes('|') && !r.includes('|-'));
            let table = '<table>';
            rows.forEach((row, i) => {
                const cols = row.split('|').filter(c => c.trim() !== '');
                table += `<tr>${cols.map(c => i===0 ? `<th>${c}</th>` : `<td>${c}</td>`).join('')}</tr>`;
            });
            div.innerHTML = table + '</table>';
        } else {
            div.innerText = text;
        }
        win.appendChild(div);
        win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
    }

    function createNewChat() {
        const id = Date.now();
        db.transaction("chats", "readwrite").objectStore("chats").add({ id, title: "محادثة جديدة", msgs: [] }).oncomplete = () => {
            currentChatId = id;
            loadHistory(false);
            openChat(id);
        };
    }

    function loadHistory(first) {
        db.transaction("chats").objectStore("chats").getAll().onsuccess = (e) => {
            const list = document.getElementById('history-list');
            const items = e.target.result.sort((a,b) => b.id - a.id);
            list.innerHTML = items.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="openChat(${chat.id})">
                    <span style="font-weight: 700;">${chat.title}</span>
                    <span onclick="deleteChat(${chat.id}, event)">🗑️</span>
                </div>
            `).join('');
            
            // فتح دردشة جديدة تلقائياً إذا كانت القائمة فارغة في أول دخول
            if(first && items.length > 0) openChat(items[0].id);
            else if(first && items.length === 0) createNewChat();
        };
    }

    function openChat(id) {
        currentChatId = id;
        document.getElementById('chat-win').innerHTML = '';
        db.transaction("chats").objectStore("chats").get(id).onsuccess = (e) => {
            const chat = e.target.result;
            if(chat) {
                document.getElementById('chat-title').innerText = chat.title;
                chat.msgs.forEach(m => appendUI(m.c, m.r === 'user' ? 'user' : 'bot'));
            }
            loadHistory(false);
        };
        if(window.innerWidth < 900) document.getElementById('sidebar').classList.remove('active');
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        db.transaction("chats", "readwrite").objectStore("chats").delete(id).oncomplete = () => {
            if(currentChatId === id) currentChatId = null;
            loadHistory(true);
        };
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function renderThemes() {
        const grid = document.getElementById('theme-grid');
        const colors = ["#7c4dff","#00e676","#ff00e6","#0091ea","#ff3d00","#ffc400","#00e5ff","#ff1744","#b2ff59","#ffee58","#2979ff","#f50057","#ff9100","#bdbdbd","#ff6d00","#fafafa","#00c853","#40c4ff","#d500f9","#f44336"];
        grid.innerHTML = colors.map((color, i) => `
            <div class="theme-card" onclick="applyTheme(${i+1})">
                <div class="card-inner">
                    <div class="color-strip" style="background:${color}"></div>
                    <div style="padding:15px; text-align:center; font-weight: 900;">ستايل ميدو ${i+1}</div>
                </div>
            </div>
        `).join('');
    }

    function applyTheme(i) {
        document.body.className = `theme-${i}`;
        db.transaction("cfg", "readwrite").objectStore("cfg").put({k: "theme", v: `theme-${i}`});
    }

    function initCanvas() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<4; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: 200+Math.random()*200, dx: Math.random()*0.3, dy: Math.random()*0.3 });
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--primary');
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.x += p.dx; p.y += p.dy;
                if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
