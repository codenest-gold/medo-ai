<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDO AI - MASTER PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508; --surface: rgba(15,15,25,0.85); --primary: #8b5cf6; --text: #ffffff; --border: rgba(139, 92, 246, 0.3); --pattern: radial-gradient(#8b5cf61a 1px, transparent 1px);
        }

        /* 20 ثيم بستايلات وحركات طرش */
        body.theme-1 { --bg: #050508; --primary: #8b5cf6; --pattern: radial-gradient(#8b5cf633 1px, transparent 1px); }
        body.theme-2 { --bg: #000800; --primary: #00ff41; --pattern: linear-gradient(rgba(0,255,65,0.05) 1px, transparent 1px); }
        body.theme-3 { --bg: #0a001a; --primary: #ff00ff; --pattern: repeating-linear-gradient(45deg, #ff00ff05 0px, #ff00ff05 10px, transparent 10px, transparent 20px); }
        body.theme-4 { --bg: #000814; --primary: #0088ff; --pattern: radial-gradient(circle, #0088ff15 0%, transparent 70%); }
        body.theme-5 { --bg: #0f0500; --primary: #ff4400; --pattern: linear-gradient(30deg, #ff440005 12%, transparent 12.5%); }
        body.theme-6 { --bg: #0d0d0d; --primary: #ffd700; --pattern: repeating-radial-gradient(circle, #ffd70005, #ffd70005 10px, transparent 10px, transparent 20px); }
        body.theme-7 { --bg: #001111; --primary: #00ffff; --pattern: linear-gradient(90deg, #00ffff05 1px, transparent 1px); }
        body.theme-8 { --bg: #1a0000; --primary: #ff0000; --pattern: radial-gradient(#ff00001a 2px, transparent 2px); }
        body.theme-9 { --bg: #051a05; --primary: #adff2f; --pattern: repeating-radial-gradient(#adff2f05 0, #adff2f05 5px, transparent 5px, transparent 10px); }
        body.theme-10{ --bg: #1a1a00; --primary: #ffff00; --pattern: linear-gradient(#ffff0005 1px, transparent 1px); }
        body.theme-11{ --bg: #00001a; --primary: #4169e1; --pattern: radial-gradient(circle at 50% 50%, #4169e115 0%, transparent 50%); }
        body.theme-12{ --bg: #1a000d; --primary: #ff69b4; --pattern: repeating-linear-gradient(-45deg, #ff69b405 0px, transparent 10px); }
        body.theme-13{ --bg: #140a00; --primary: #d2691e; --pattern: radial-gradient(circle, #d2691e10 1px, transparent 1px); }
        body.theme-14{ --bg: #0a0a0a; --primary: #c0c0c0; --pattern: linear-gradient(45deg, #c0c0c005 25%, transparent 25%); }
        body.theme-15{ --bg: #1a0800; --primary: #ff8c00; --pattern: radial-gradient(#ff8c0015 1px, transparent 1px); }
        body.theme-16{ --bg: #000000; --primary: #ffffff; --pattern: radial-gradient(circle, #ffffff15 1px, transparent 1px); }
        body.theme-17{ --bg: #020b02; --primary: #2ecc71; --pattern: linear-gradient(to right, #2ecc7105 1px, transparent 1px); }
        body.theme-18{ --bg: #0a0e14; --primary: #5dade2; --pattern: radial-gradient(circle at top right, #5dade21a, transparent); }
        body.theme-19{ --bg: #120b1a; --primary: #af7ac5; --pattern: repeating-linear-gradient(90deg, #af7ac503 0px, #af7ac503 2px, transparent 2px, transparent 4px); }
        body.theme-20{ --bg: #17202a; --primary: #e74c3c; --pattern: radial-gradient(#e74c3c15 1px, transparent 0); background-size: 20px 20px; }

        html, body { 
            height: 100dvh; margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--bg); background-image: var(--pattern); background-size: 30px 30px;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: background 0.3s, color 0.3s, transform 0.2s; }

        .app-container { display: flex; height: 100dvh; width: 100vw; }
        
        /* Sidebar */
        .sidebar { 
            width: 320px; background: rgba(10,10,15,0.96); backdrop-filter: blur(25px); 
            border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; z-index: 1000;
        }
        
        @media (max-width: 900px) { 
            .sidebar { position: fixed; right: 0; top: 0; bottom: 0; transform: translateX(100%); width: 85%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); } 
            .sidebar.active { transform: translateX(0); }
        }

        .brand h1 { font-size: 30px; color: var(--primary); text-align: center; margin-bottom: 25px; text-shadow: 0 0 25px var(--primary); font-weight: 900; letter-spacing: 1px;}
        
        .chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 5px; }
        .chat-item { 
            padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; color: var(--text);
        }
        .chat-item:hover { background: rgba(255,255,255,0.08); transform: translateX(-3px); }
        .chat-item.active { border-color: var(--primary); background: rgba(139, 92, 246, 0.2); box-shadow: inset 0 0 10px rgba(139, 92, 246, 0.2); }
        .del-chat { color: #ff4444; opacity: 0.4; font-size: 18px; transition: 0.2s; }
        .del-chat:hover { opacity: 1; transform: scale(1.2); }

        /* Main Chat */
        .main-chat { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; }
        
        .header { 
            height: 75px; background: rgba(15,15,21,0.88); backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; 
        }
        
        .chat-window { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        .bubble { 
            max-width: 85%; padding: 15px 22px; border-radius: 20px; font-size: 15.5px; 
            line-height: 1.6; animation: pop 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); word-wrap: break-word;
        }
        @keyframes pop { from { transform: scale(0.7) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        .bot { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; border-bottom-right-radius: 5px; color: #f0f0f0; border: 1px solid rgba(255,255,255,0.05); }
        .user { background: linear-gradient(135deg, var(--primary), #4c1d95); align-self: flex-end; border-bottom-left-radius: 5px; color: #fff; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }

        .generated-image { max-width: 100%; border-radius: 15px; margin-top: 15px; border: 3px solid var(--primary); box-shadow: 0 0 20px var(--primary); cursor: pointer; transition: 0.3s; }
        .generated-image:hover { transform: scale(1.02); }

        .footer-area { padding: 20px; background: transparent; }
        .input-bar { 
            background: rgba(25, 25, 37, 0.98); border: 2px solid var(--border); 
            border-radius: 20px; padding: 10px 20px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); backdrop-filter: blur(10px);
        }
        textarea { flex: 1; background: transparent; border: none; color: #fff; resize: none; outline: none; font-size: 16px; height: 32px; max-height: 200px; }

        .btn-action { background: var(--primary); padding: 14px 20px; border: none; border-radius: 14px; color: #fff; cursor: pointer; font-weight: bold; font-size: 15px;}
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--primary); }
        
        .icon-btn { font-size: 28px; cursor: pointer; background: none; border: none; color: var(--text); padding: 8px; border-radius: 50%; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); color: var(--primary); transform: rotate(15deg); }

        #typing { color: var(--primary); font-size: 14px; margin: 10px 30px; display: none; font-weight: 600; text-shadow: 0 0 10px var(--primary); }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: #0d0d12; width: 95%; max-width: 650px; padding: 35px; border-radius: 30px; border: 2px solid var(--primary); box-shadow: 0 0 50px rgba(139, 92, 246, 0.3); }
        
        /* ستايل شبكة الثيمات الجديد */
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 18px; max-height: 500px; overflow-y: auto; padding: 15px; }
        .theme-card { 
            padding: 25px 15px; border-radius: 18px; cursor: pointer; text-align: center; 
            font-weight: 900; font-size: 16px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .theme-card:hover { transform: translateY(-5px) scale(1.03); }
        
        input, textarea { width: 100%; background: #16161f; border: 1px solid var(--border); padding: 16px; border-radius: 14px; color: #fff; margin-bottom: 15px; font-size: 15px; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
    </style>
</head>
<body class="theme-1">

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="brand"><h1>MIDO AI</h1></div>
        <button class="btn-action" style="margin-bottom: 20px; width: 100%;" onclick="createNewChat()">+ محادثة جديدة</button>
        <div class="chat-history" id="chat-history"></div>
        <button class="btn-action" style="margin-top: 15px; background: rgba(255,255,255,0.05); width: 100%;" onclick="openThemes()">🎨 المعرض الملكي</button>
    </aside>

    <main class="main-chat">
        <header class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="icon-btn" onclick="toggleSidebar()">☰</button>
                <h2 id="current-title" style="font-size: 22px; color: var(--primary); margin: 0; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 900;">ميدو برو</h2>
            </div>
            <button class="icon-btn" onclick="openTeach()" title="علم ميدو">🤡</button>
        </header>

        <div class="chat-window" id="chat-win"></div>
        <div id="typing">ميدو بيفكر... ✨</div>

        <footer class="footer-area">
            <div class="input-bar">
                <textarea id="msg-input" placeholder="قول حاجة يا برنس (او قولو ارسملي...)" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                <button class="icon-btn" style="color: var(--primary);" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </footer>
    </main>
</div>

<div id="theme-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 25px; font-weight: 900; font-size: 24px;">اختر ستايلك يا ملك 🔥</h2>
        <div class="theme-grid" id="theme-grid"></div>
    </div>
</div>

<div id="teach-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 25px; font-weight: 900;">🤡 غسيل مخ لميدو</h2>
        <input type="text" id="teach-q" placeholder="لو قولتلك (مثلاً: أنت مين؟)...">
        <textarea id="teach-a" rows="3" placeholder="ميدو يرد يقول (مثلاً: أنا ميدو يا قلب ميدو)..."></textarea>
        <button class="btn-action" style="width: 100%;" onclick="saveMemory()">حفظ في الذاكرة</button>
    </div>
</div>

<script>
    let db;
    let currentChatId = null;
    let chatsHistory = [];
    let brainMemory = [];
    
    // إعدادات الهوية الأساسية
    const SYSTEM_PROMPT = "أنت ميدو (MIDO AI)، مساعد ذكي وبرنس وصاحب واجب. اسمك ميدو. صانعك هو المطور ميدو ورقم هاتفه +201124680211. رد دايماً بلهجة مصرية روشة ومحبوبة. لو المستخدم طلب صورة، ابدأ ردك بكلمة 'ثانية واحدة هرسمالك...'، لو طلب رسمة وانت وافقت، قولو انك هترسمها. لا تذكر OpenAI أو ChatGPT أبداً.";

    // إعداد IndexedDB
    const request = indexedDB.open("MidoMasterProDB", 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore('chats', { keyPath: 'id' });
        db.createObjectStore('brain', { keyPath: 'q' });
        db.createObjectStore('config', { keyPath: 'key' });
    };
    request.onsuccess = (e) => {
        db = e.target.result;
        initApp();
    };

    function initApp() {
        // تحميل الثيم المحفوظ
        db.transaction("config").objectStore("config").get("theme").onsuccess = (e) => {
            if(e.target.result) document.body.className = e.target.result.value;
        };
        // تحميل الذاكرة المحلية
        db.transaction("brain").objectStore("brain").getAll().onsuccess = (e) => {
            brainMemory = e.target.result;
        };
        // تحميل المحادثات
        loadAllChats();
        renderThemesGrid();
    }

    function loadAllChats() {
        db.transaction("chats").objectStore("chats").getAll().onsuccess = (e) => {
            chatsHistory = e.target.result.sort((a,b) => b.id - a.id);
            renderHistoryUI();
            if (chatsHistory.length > 0 && !currentChatId) {
                openChat(chatsHistory[0].id);
            } else if (chatsHistory.length === 0) {
                createNewChat();
            }
        };
    }

    function renderHistoryUI() {
        const container = document.getElementById('chat-history');
        container.innerHTML = '';
        chatsHistory.forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            div.onclick = () => openChat(chat.id);
            div.innerHTML = `
                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600;">${chat.title}</span>
                <span class="del-chat" onclick="deleteChat(${chat.id}, event)">🗑️</span>
            `;
            container.appendChild(div);
        });
    }

    function createNewChat() {
        const newId = Date.now();
        const newChat = {
            id: newId,
            title: "محادثة جديدة",
            messages: [{ role: 'assistant', content: "أنا ميدو يا برنس.. اؤمرني أرسم لك ولا ندردش؟" }]
        };
        const tx = db.transaction("chats", "readwrite");
        tx.objectStore("chats").add(newChat);
        tx.oncomplete = () => {
            currentChatId = newId;
            loadAllChats();
        };
    }

    function openChat(id) {
        currentChatId = id;
        const chat = chatsHistory.find(c => c.id === id);
        if(!chat) return;
        
        document.getElementById('current-title').innerText = chat.title;
        const win = document.getElementById('chat-win');
        win.innerHTML = '';
        chat.messages.forEach(m => {
            // التحقق لو الرسالة تحتوي على صورة
            if (m.image) {
                appendImageBubble(m.content, m.image, m.role === 'user' ? 'user' : 'bot');
            } else {
                appendBubbleUI(m.content, m.role === 'user' ? 'user' : 'bot');
            }
        });
        renderHistoryUI();
        if(window.innerWidth <= 900) document.getElementById('sidebar').classList.remove('active');
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text || !currentChatId) return;

        const chat = chatsHistory.find(c => c.id === currentChatId);
        
        // تغيير العنوان لو لسه جديد
        if(chat.title === "محادثة جديدة") {
            chat.title = text.substring(0, 25);
            document.getElementById('current-title').innerText = chat.title;
        }

        appendBubbleUI(text, 'user');
        chat.messages.push({ role: 'user', content: text });
        input.value = '';
        input.style.height = '32px';
        document.getElementById('typing').style.display = 'block';

        // 1. تشييك التعلم المحلي
        const learned = brainMemory.find(m => text.toLowerCase().includes(m.q));
        if(learned) {
            setTimeout(() => respondBot(learned.a), 600);
            return;
        }

        // 2. تشييك طلب الصور
        const imageKeywords = ['ارسملي', 'ارسم لي', 'تخيل صورة ل', 'صورة ل', 'رسمة ل', 'create image for', 'imagine'];
        const wantsImage = imageKeywords.some(key => text.toLowerCase().startsWith(key));

        if (wantsImage) {
            handleImageRequest(text, chat);
            return;
        }

        // 3. ذكاء اصطناعي نصي
        try {
            const res = await fetch('https://text.pollinations.ai/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...chat.messages.slice(-6)],
                    model: 'openai',
                    seed: 42
                })
            });
            const botText = await res.text();
            respondBot(botText);
        } catch(e) {
            respondBot("السيرفر هنيج يا زميلي، جرب تاني كدة!");
        }
    }

    // معالجة طلب الصور
    async function handleImageRequest(text, chat) {
        // استخراج الوصف من النص
        let prompt = text;
        const triggers = ['ارسملي', 'ارسم لي', 'تخيل صورة ل', 'صورة ل', 'رسمة ل'];
        triggers.forEach(t => prompt = prompt.replace(t, ''));
        prompt = prompt.trim();

        if (!prompt) prompt = "جميلة ونادرة"; // fallback

        const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?nologo=true&private=true&enhance=true`;

        // إضافة رسالة انتقالية
        const waitingText = `ثانية واحدة هرسمالك كدة بـ "${prompt}"... 🎨`;
        respondBot(waitingText, imageUrl, prompt);
    }

    function respondBot(text, imageUrl = null, prompt = null) {
        document.getElementById('typing').style.display = 'none';
        const chat = chatsHistory.find(c => c.id === currentChatId);
        
        const newMsg = { role: 'assistant', content: text };
        if (imageUrl) newMsg.image = imageUrl; // تخزين رابط الصورة في الكائن

        chat.messages.push(newMsg);
        
        if (imageUrl) {
            appendImageBubble(text, imageUrl, 'bot');
        } else {
            appendBubbleUI(text, 'bot');
        }
        
        // حفظ في IndexedDB
        const tx = db.transaction("chats", "readwrite");
        tx.objectStore("chats").put(chat);
    }

    function appendBubbleUI(text, type) {
        const win = document.getElementById('chat-win');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    // فقاعة خاصة بالصور
    function appendImageBubble(text, imageUrl, type) {
        const win = document.getElementById('chat-win');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        
        const txtSpan = document.createElement('span');
        txtSpan.innerText = text;
        div.appendChild(txtSpan);

        const img = document.createElement('img');
        img.src = imageUrl;
        img.className = 'generated-image';
        img.alt = 'ميدو رسم دي';
        img.onclick = () => window.open(imageUrl, '_blank'); // فتح الصورة في تبويب جديد عند الضغط
        div.appendChild(img);

        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        if(!confirm("تمسح المحادثة دي نهائياً؟")) return;
        const tx = db.transaction("chats", "readwrite");
        tx.objectStore("chats").delete(id);
        tx.oncomplete = () => {
            if(currentChatId === id) currentChatId = null;
            loadAllChats();
        };
    }

    function saveMemory() {
        const q = document.getElementById('teach-q').value.trim().toLowerCase();
        const a = document.getElementById('teach-a').value.trim();
        if(!q || !a) return;
        const tx = db.transaction("brain", "readwrite");
        tx.objectStore("brain").put({q, a});
        tx.oncomplete = () => {
            db.transaction("brain").objectStore("brain").getAll().onsuccess = (e) => brainMemory = e.target.result;
            document.getElementById('teach-modal').style.display = 'none';
            document.getElementById('teach-q').value = '';
            document.getElementById('teach-a').value = '';
            alert("ميدو حفظ الحركة دي خلاص!");
        };
    }

    // بيانات الثيمات للعرض في المعرض (الخلفية واللون الأساسي)
    const themesVisualData = [
        {id:1, n:"البنفسجي الملكي", bg:"#050508", p:"#8b5cf6"},
        {id:2, n:"مصفوفة الماتريكس", bg:"#000800", p:"#00ff41"},
        {id:3, n:"سايبر بانك نيون", bg:"#0a001a", p:"#ff00ff"},
        {id:4, n:"أعماق المحيط", bg:"#000814", p:"#0088ff"},
        {id:5, n:"الحمم البركانية", bg:"#0f0500", p:"#ff4400"},
        {id:6, n:"الذهب العتيق", bg:"#0d0d0d", p:"#ffd700"},
        {id:7, n:"سيان المتجمد", bg:"#001111", p:"#00ffff"},
        {id:8, n:"الغسق الدموي", bg:"#1a0000", p:"#ff0000"},
        {id:9, n:"السم النباتي", bg:"#051a05", p:"#adff2f"},
        {id:10, n:"صدمة كهربائية", bg:"#1a1a00", p:"#ffff00"},
        {id:11, n:"ملك الليل", bg:"#00001a", p:"#4169e1"},
        {id:12, n:"أزهار الكرز", bg:"#1a000d", p:"#ff69b4"},
        {id:13, n:"القهوة العربي", bg:"#140a00", p:"#d2691e"},
        {id:14, n:"الدرع الفضي", bg:"#0a0a0a", p:"#c0c0c0"},
        {id:15, n:"نيون برتقالي", bg:"#1a0800", p:"#ff8c00"},
        {id:16, n:"فضاء مظلم", bg:"#000000", p:"#ffffff"},
        {id:17, n:"زمرد الطبيعة", bg:"#020b02", p:"#2ecc71"},
        {id:18, n:"فجر السماوي", bg:"#0a0e14", p:"#5dade2"},
        {id:19, n:"لافندر ساحر", bg:"#120b1a", p:"#af7ac5"},
        {id:20, n:"لهيب النار", bg:"#17202a", p:"#e74c3c"}
    ];

    function renderThemesGrid() {
        const grid = document.getElementById('theme-grid');
        grid.innerHTML = '';
        themesVisualData.forEach(t => {
            const card = document.createElement('div');
            card.className = 'theme-card';
            // تطبيق الوان الثيم على المربع فوراً للمعاينة
            card.style.backgroundColor = t.bg;
            card.style.border = `2px solid ${t.p}`;
            card.style.color = t.p; // الاسم يتلون باللون الاساسي
            card.style.textShadow = `0 0 10px ${t.p}`; // توهج للاسم

            card.innerText = t.n;
            card.onclick = () => {
                document.body.className = `theme-${t.id}`;
                db.transaction("config", "readwrite").objectStore("config").put({key: "theme", value: `theme-${t.id}`});
                // إغلاق المودال بعد الاختيار على الموبايل
                if(window.innerWidth <= 600) document.getElementById('theme-modal').style.display='none';
            };
            grid.appendChild(card);
        });
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function openThemes() { document.getElementById('theme-modal').style.display = 'flex'; }
    function openTeach() { document.getElementById('teach-modal').style.display = 'flex'; }
    
    // التعامل مع زر Enter للارسال
    document.getElementById('msg-input').onkeydown = (e) => { 
        if(e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) { 
            e.preventDefault(); 
            sendMessage(); 
        } 
    };
</script>
</body>
</html>
