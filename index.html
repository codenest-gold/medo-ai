<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDO AI - THE LEGEND</title>
    
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIk1JRE8gQUkgLSBUSEUgTEVHRU5EIiwKICAic2hvcnRfbmFtZSI6ICJNSURPIEFJIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwNTA1MDgiLAogICJ0aGVtZV9jb2xvciI6ICIjOGI1Y2Y2IiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsaXRpY29uLmNvbS81MTIvMjEwOC8yMTA4NjQyLnBuZyIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508; --surface: rgba(15,15,25,0.9); --primary: #8b5cf6; --text: #ffffff; --border: rgba(139, 92, 246, 0.3);
            --pattern: radial-gradient(#8b5cf61a 1px, transparent 1px);
        }

        /* الثيمات الـ 20 */
        body.theme-1 { --bg: #050508; --primary: #8b5cf6; }
        body.theme-2 { --bg: #000a00; --primary: #00ff41; }
        body.theme-3 { --bg: #0a001a; --primary: #ff00ff; }
        body.theme-4 { --bg: #000814; --primary: #0088ff; }
        body.theme-5 { --bg: #0f0500; --primary: #ff4400; }
        body.theme-6 { --bg: #0d0d0d; --primary: #ffd700; }
        body.theme-7 { --bg: #001111; --primary: #00ffff; }
        body.theme-8 { --bg: #1a0000; --primary: #ff0000; }
        body.theme-9 { --bg: #051a05; --primary: #adff2f; }
        body.theme-10{ --bg: #1a1a00; --primary: #ffff00; }
        body.theme-11{ --bg: #00001a; --primary: #4169e1; }
        body.theme-12{ --bg: #1a000d; --primary: #ff69b4; }
        body.theme-13{ --bg: #140a00; --primary: #d2691e; }
        body.theme-14{ --bg: #0a0a0a; --primary: #c0c0c0; }
        body.theme-15{ --bg: #1a0800; --primary: #ff8c00; }
        body.theme-16{ --bg: #000000; --primary: #ffffff; }
        body.theme-17{ --bg: #020b02; --primary: #2ecc71; }
        body.theme-18{ --bg: #0a0e14; --primary: #5dade2; }
        body.theme-19{ --bg: #120b1a; --primary: #af7ac5; }
        body.theme-20{ --bg: #17202a; --primary: #e74c3c; }

        html, body { 
            height: 100dvh; margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--bg); background-image: var(--pattern); background-size: 30px 30px;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .app-container { display: flex; height: 100dvh; width: 100vw; }
        
        /* Sidebar */
        .sidebar { 
            width: 320px; background: rgba(10,10,15,0.98); backdrop-filter: blur(20px); 
            border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; z-index: 1000;
        }
        @media (max-width: 900px) { 
            .sidebar { position: fixed; right: 0; top: 0; bottom: 0; transform: translateX(100%); width: 85%; } 
            .sidebar.active { transform: translateX(0); }
        }

        .brand h1 { font-size: 32px; color: var(--primary); text-align: center; margin-bottom: 25px; text-shadow: 0 0 20px var(--primary); font-weight: 900; }
        
        .chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-item { 
            padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: var(--text);
        }
        .chat-item.active { border-color: var(--primary); background: rgba(139, 92, 246, 0.2); }

        /* Main Chat */
        .main-chat { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; }
        .header { 
            height: 70px; background: rgba(15,15,21,0.9); backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; 
        }

        /* Personality Select */
        .persona-box {
            background: rgba(139, 92, 246, 0.1); border: 1px solid var(--primary);
            color: var(--text); padding: 5px 10px; border-radius: 10px; font-weight: bold; outline: none;
        }

        .chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .bubble { 
            max-width: 85%; padding: 15px; border-radius: 20px; font-size: 16px; line-height: 1.6;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); position: relative; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .bot { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; color: #fff; border-bottom-right-radius: 2px; }
        .user { background: linear-gradient(135deg, var(--primary), #4c1d95); align-self: flex-end; color: #fff; border-bottom-left-radius: 2px; }

        .footer { padding: 20px; }
        .input-bar { 
            background: rgba(30,30,45,0.95); border: 2px solid var(--border); 
            border-radius: 18px; padding: 10px 15px; display: flex; align-items: center; gap: 10px;
        }
        textarea { flex: 1; background: transparent; border: none; color: #fff; resize: none; outline: none; font-size: 16px; height: 30px; }

        .img-container { margin-top: 10px; border-radius: 15px; overflow: hidden; border: 2px solid var(--primary); }
        .img-container img { width: 100%; display: block; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #111; width: 95%; max-width: 700px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); }
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; max-height: 500px; overflow-y: auto; }
        .theme-box { aspect-ratio: 1/1; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; border: 3px solid transparent; }
        .theme-box span { background: rgba(0,0,0,0.8); color: white; padding: 4px; border-radius: 6px; font-size: 12px; text-align: center; }

        .icon-btn { font-size: 28px; cursor: pointer; background: none; border: none; color: var(--text); }
        #typing { color: var(--primary); font-size: 14px; display: none; margin: 5px 20px; font-weight: bold; }
        .btn-action { background: var(--primary); padding: 12px; border: none; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body class="theme-1">

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="brand"><h1>MIDO AI</h1></div>
        <button class="btn-action" onclick="createNewChat()">+ محادثة جديدة</button>
        <div class="chat-history" id="chat-history"></div>
        <button class="btn-action" style="background: rgba(255,255,255,0.1); margin-top: 10px;" onclick="openThemes()">🎨 معرض الثيمات</button>
    </aside>

    <main class="main-chat">
        <header class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="icon-btn" onclick="toggleSidebar()">☰</button>
                <select id="bot-type" class="persona-box" onchange="changePersona()">
                    <option value="general">🤖 عام</option>
                    <option value="gym">💪 مدرب جيم</option>
                    <option value="nutrition">🍎 أخصائي تغذية</option>
                    <option value="friend">❤️ صديق</option>
                    <option value="saye">😎 صايع</option>
                    <option value="dealer">🚬 ديلر</option>
                    <option value="teacher">👨‍🏫 مدرس</option>
                </select>
            </div>
            <button class="icon-btn" onclick="openTeach()">🤡</button>
        </header>

        <div class="chat-window" id="chat-win"></div>
        <div id="typing">ميدو بيفكر... ✨</div>

        <footer class="footer">
            <div class="input-bar">
                <textarea id="msg-input" placeholder="اطلب صورة أو دردش..." rows="1"></textarea>
                <button class="icon-btn" style="color: var(--primary);" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </footer>
    </main>
</div>

<div id="theme-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 20px;">اختر ثيم 🔥</h2>
        <div class="theme-grid" id="theme-grid"></div>
    </div>
</div>

<div id="teach-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 20px;">علم ميدو 🤡</h2>
        <input type="text" id="teach-q" style="width:100%; padding:15px; background:#1a1a1a; color:#fff; border-radius:10px; border:1px solid var(--primary); margin-bottom:10px;" placeholder="لو قولتلك...">
        <textarea id="teach-a" style="width:100%; padding:15px; background:#1a1a1a; color:#fff; border-radius:10px; border:1px solid var(--primary); margin-bottom:10px;" rows="3" placeholder="رد بـ..."></textarea>
        <button class="btn-action" onclick="saveMemory()">حفظ في العقل</button>
    </div>
</div>

<script>
    let db;
    let currentChatId = null;
    let brainMemory = [];
    
    // تعريف الشخصيات
    const personas = {
        general: "أنت ميدو، ذكاء اصطناعي مصري برنس. ساعد الناس بذكاء وخفة دم.",
        gym: "أنت كوتش جيم مصري فورمة. كلامك كله تحفيز، بروتين، وعاش يا وحش. شجع المستخدم يتمرن.",
        nutrition: "أنت أخصائي تغذية مصري. بتكره السكر والزيوت المهدرجة. انصح الناس بالأكل الصحي بالهداوة.",
        friend: "أنت صديق المستخدم الأنتيم. اتكلم معاه بصدق، اسمع منه، وواسيه بلهجة مصرية حنينة.",
        saye: "أنت ميدو الصايع. كلامك كله لغة شوارع، 'خلصانة بشياكة'، ومحدش يقدر يضحك عليك.",
        dealer: "أنت ديلر معلومات (بشكل كوميدي). اتكلم في السر، كأنك بتسلم بضاعة 'ممنوعة' وهي مجرد معلومة.",
        teacher: "أنت مدرس مصري برنس. اشرح الحاجة بضمير بس بتبسيط شديد وأمثلة من الواقع."
    };

    const request = indexedDB.open("MidoPWA_DB", 2);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if(!db.objectStoreNames.contains('chats')) db.createObjectStore('chats', { keyPath: 'id' });
        if(!db.objectStoreNames.contains('brain')) db.createObjectStore('brain', { keyPath: 'q' });
        if(!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'key' });
    };
    request.onsuccess = (e) => { db = e.target.result; initApp(); };

    function initApp() {
        db.transaction("config").objectStore("config").get("theme").onsuccess = (e) => {
            if(e.target.result) document.body.className = e.target.result.value;
        };
        db.transaction("brain").objectStore("brain").getAll().onsuccess = (e) => { brainMemory = e.target.result; };
        loadChats();
        renderThemes();
    }

    function changePersona() {
        const type = document.getElementById('bot-type').value;
        alert("ميدو اتحول لـ " + type + "!");
    }

    function loadChats() {
        db.transaction("chats").objectStore("chats").getAll().onsuccess = (e) => {
            const chats = e.target.result.sort((a,b) => b.id - a.id);
            const history = document.getElementById('chat-history');
            history.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                div.onclick = () => openChat(chat.id);
                div.innerHTML = `<span>${chat.title}</span><span onclick="deleteChat(${chat.id}, event)">🗑️</span>`;
                history.appendChild(div);
            });
            if(chats.length > 0 && !currentChatId) openChat(chats[0].id);
            else if(chats.length === 0) createNewChat();
        };
    }

    function createNewChat() {
        const id = Date.now();
        const chat = { id, title: "محادثة جديدة", messages: [{ role: 'assistant', content: "أنا ميدو يا زميلي.. اؤمرني!" }] };
        db.transaction("chats", "readwrite").objectStore("chats").add(chat).oncomplete = () => {
            currentChatId = id;
            loadChats();
        };
    }

    function openChat(id) {
        currentChatId = id;
        db.transaction("chats").objectStore("chats").get(id).onsuccess = (e) => {
            const chat = e.target.result;
            if(!chat) return;
            const win = document.getElementById('chat-win');
            win.innerHTML = '';
            chat.messages.forEach(m => appendBubbleUI(m.content, m.role === 'user' ? 'user' : 'bot', m.image));
            loadChats();
        };
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;

        appendBubbleUI(text, 'user');
        input.value = '';
        document.getElementById('typing').style.display = 'block';

        const tx = db.transaction("chats", "readwrite");
        const store = tx.objectStore("chats");
        store.get(currentChatId).onsuccess = async (e) => {
            const chat = e.target.result;
            chat.messages.push({ role: 'user', content: text });
            if(chat.title === "محادثة جديدة") chat.title = text.substring(0, 15);

            // تشييك الذاكرة
            const learned = brainMemory.find(m => text.toLowerCase().includes(m.q));
            if(learned) {
                setTimeout(() => botResponse(chat, learned.a), 500);
                return;
            }

            // تشييك الصور
            if(['ارسم', 'صورة', 'تخيل'].some(k => text.includes(k))) {
                const p = text.replace(/ارسم|صورة|تخيل/g, '').trim();
                const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=1024&height=1024&nologo=true`;
                botResponse(chat, "خد دي يا وحش...", url);
            } else {
                const personaKey = document.getElementById('bot-type').value;
                try {
                    const res = await fetch('https://text.pollinations.ai/', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            messages: [{role: 'system', content: personas[personaKey]}, ...chat.messages.slice(-5)],
                            model: 'openai'
                        })
                    });
                    botResponse(chat, await res.text());
                } catch { botResponse(chat, "النت واقع!"); }
            }
        };
    }

    function botResponse(chat, text, imgUrl = null) {
        document.getElementById('typing').style.display = 'none';
        const msg = { role: 'assistant', content: text };
        if(imgUrl) msg.image = imgUrl;
        chat.messages.push(msg);
        appendBubbleUI(text, 'bot', imgUrl);
        db.transaction("chats", "readwrite").objectStore("chats").put(chat).oncomplete = loadChats;
    }

    function appendBubbleUI(text, type, imgUrl = null) {
        const win = document.getElementById('chat-win');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        if(imgUrl) {
            const imgDiv = document.createElement('div');
            imgDiv.className = 'img-container';
            imgDiv.innerHTML = `<img src="${imgUrl}" onclick="window.open('${imgUrl}')">`;
            div.appendChild(imgDiv);
        }
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function renderThemes() {
        const themes = [
            {id:1, n:"بنفسجي", c:"#8b5cf6", b:"#050508"}, {id:2, n:"ماتريكس", c:"#00ff41", b:"#000a00"},
            {id:8, n:"دموي", c:"#ff0000", b:"#1a0000"}, {id:16, n:"أبيض", c:"#ffffff", b:"#000000"}
        ];
        const grid = document.getElementById('theme-grid');
        themes.forEach(t => {
            const box = document.createElement('div');
            box.className = 'theme-box';
            box.style.backgroundColor = t.b;
            box.style.borderColor = t.c;
            box.innerHTML = `<span>${t.n}</span>`;
            box.onclick = () => {
                document.body.className = `theme-${t.id}`;
                db.transaction("config", "readwrite").objectStore("config").put({key: "theme", value: `theme-${t.id}`});
            };
            grid.appendChild(box);
        });
    }

    function saveMemory() {
        const q = document.getElementById('teach-q').value.trim().toLowerCase();
        const a = document.getElementById('teach-a').value.trim();
        if(!q || !a) return;
        db.transaction("brain", "readwrite").objectStore("brain").put({q, a}).oncomplete = () => {
            db.transaction("brain").objectStore("brain").getAll().onsuccess = (e) => brainMemory = e.target.result;
            document.getElementById('teach-modal').style.display = 'none';
            alert("ميدو اتعلم!");
        };
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        db.transaction("chats", "readwrite").objectStore("chats").delete(id).oncomplete = loadChats;
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function openThemes() { document.getElementById('theme-modal').style.display='flex'; }
    function openTeach() { document.getElementById('teach-modal').style.display='flex'; }

    // تشغيل الـ Service Worker عشان الـ PWA
    if ('serviceWorker' in navigator) {
        const code = "self.addEventListener('fetch', function(event) {});";
        const blob = new Blob([code], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>
</body>
</html>
