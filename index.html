<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mido AI - Secret Edition</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #121212;
            --chat-bg: #f5f7fb;
            --user-blue: #0078ff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--dark-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .mido-container {
            width: 420px;
            height: 680px;
            background: white;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 2px solid var(--gold);
            position: relative;
        }
        
        .header {
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }
        .header h1 { margin: 0; color: var(--gold); font-size: 22px; }
        .header span { font-size: 10px; color: #aaa; }

        #chat-window {
            flex: 1;
            background: var(--chat-bg);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }
        .bot { background: white; align-self: flex-start; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-right: 4px solid var(--gold); }
        .user { background: var(--user-blue); color: white; align-self: flex-end; }
        .system { background: #fff3cd; color: #856404; align-self: center; font-size: 12px; padding: 8px; border-radius: 10px; text-align: center; width: 80%; }

        .controls { padding: 15px; background: white; border-top: 1px solid #eee; }
        input { padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-family: inherit; margin-bottom: 5px; }
        
        .btn { background: var(--gold); border: none; padding: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* تنسيق واجهة التعلم */
        #learn-mode-ui { display: none; flex-direction: column; gap: 8px; border: 1px solid #ddd; padding: 10px; border-radius: 15px; background: #fafafa; }
        
        /* الزر الشفاف تماماً */
        .secret-trigger {
            height: 20px;
            width: 100%;
            background: transparent;
            cursor: default;
            text-align: center;
            font-size: 10px;
            color: transparent; /* مخفي تماماً */
            user-select: none;
        }
    </style>
</head>
<body>

<div class="mido-container">
    <div class="header">
        <h1>ميدو AI</h1>
        <span>CODENEST GOLD PRODUCTION</span>
    </div>

    <div id="chat-window"></div>

    <div class="controls">
        <div id="chat-mode-ui" style="display: flex; gap: 8px;">
            <input type="text" id="chat-in" style="flex:1" placeholder="اسأل ميدو..." onkeypress="if(event.key==='Enter') processInput()">
            <button class="btn" onclick="processInput()">إرسال</button>
        </div>

        <div id="learn-mode-ui">
            <b style="font-size: 12px; color: var(--gold);">وضع التعلم السري 🔐</b>
            <input type="text" id="learn-q" placeholder="السؤال الكامل...">
            <input type="text" id="learn-a" placeholder="الإجابة...">
            <button class="btn" style="background:#28a745; color:white" onclick="saveKnowledge()">حفظ وإغلاق</button>
        </div>

        <div class="secret-trigger" onclick="toggleSecretMode()">Secret Access</div>
    </div>
</div>

<script>
    let db;
    let lastSuggestion = null; // لحفظ السؤال الذي اقترحه الروبوت

    const dbReq = indexedDB.open("MidoAI_Smart_DB", 1);
    dbReq.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore("brain", { keyPath: "question" });
    };
    dbReq.onsuccess = (e) => { db = e.target.result; addMsg("مرحباً بك.. كيف حالك اليوم؟", "bot"); };

    function addMsg(text, sender) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        div.innerHTML = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    // تبديل الوضع السري
    function toggleSecretMode() {
        const ui = document.getElementById('learn-mode-ui');
        const chat = document.getElementById('chat-mode-ui');
        if(ui.style.display === "none" || ui.style.display === "") {
            ui.style.display = "flex";
            chat.style.display = "none";
        } else {
            ui.style.display = "none";
            chat.style.display = "flex";
        }
    }

    function processInput() {
        const input = document.getElementById('chat-in');
        let val = input.value.trim().toLowerCase();
        if(!val) return;

        addMsg(val, "user");
        input.value = "";

        // 1. التعامل مع التأكيد (آه / نعم)
        const confirmWords = ["اه", "آه", "نعم", "ايوه", "ايوة", "تمام"];
        if(confirmWords.includes(val) && lastSuggestion) {
            addMsg(lastSuggestion.answer, "bot");
            lastSuggestion = null;
            return;
        }

        // 2. البحث عن السؤال الكامل
        const tx = db.transaction("brain", "readonly");
        const store = tx.objectStore("brain");
        
        const getReq = store.get(val);
        getReq.onsuccess = () => {
            if(getReq.result) {
                addMsg(getReq.result.answer, "bot");
            } else {
                // 3. نظام التوقع الذكي (البحث بكلمة واحدة)
                searchSuggestions(val);
            }
        };
    }

    function searchSuggestions(word) {
        const tx = db.transaction("brain", "readonly");
        const store = tx.objectStore("brain");
        const req = store.getAll();

        req.onsuccess = () => {
            const allRecords = req.result;
            // البحث عن سؤال يحتوي على الكلمة المدخلة
            const match = allRecords.find(r => r.question.includes(word));

            if(match) {
                lastSuggestion = match;
                addMsg(`هل تقصد أن تقول: "<b>${match.question}</b>"؟`, "bot");
            } else {
                addMsg("لم أفهم ما تقصده، هل يمكنك توضيح أكثر؟ وكيف حالك؟", "bot");
            }
        };
    }

    function saveKnowledge() {
        const q = document.getElementById('learn-q').value.trim().toLowerCase();
        const a = document.getElementById('learn-a').value.trim();
        if(!q || !a) return alert("اكمل البيانات");

        const tx = db.transaction("brain", "readwrite");
        tx.objectStore("brain").put({ question: q, answer: a });
        tx.oncomplete = () => {
            addMsg("تم الحفظ في الذاكرة بنجاح!", "system");
            document.getElementById('learn-q').value = "";
            document.getElementById('learn-a').value = "";
            toggleSecretMode(); // العودة للدردشة
        };
    }
</script>
</body>
</html>
