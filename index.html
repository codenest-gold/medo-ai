<!doctype html>
<html lang="ar">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>شات بوت ذكي مع IndexedDB</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;padding:20px}
  #chat{max-width:900px;margin:0 auto;background:#fff;border-radius:10px;padding:18px;box-shadow:0 4px 18px rgba(0,0,0,.06)}
  h1{margin:0 0 12px;font-size:20px}
  #messages{height:60vh;overflow:auto;padding:8px;border:1px solid #eee;border-radius:8px;background:#fafafa}
  .msg{margin:8px 0;padding:10px;border-radius:8px;max-width:78%}
  .user{background:#e6f7ff;margin-left:auto}
  .bot{background:#f0f0f0}
  .meta{font-size:11px;color:#666;margin-top:6px}
  #inputRow{display:flex;gap:8px;margin-top:12px}
  input{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px}
  button{padding:10px 14px;border:none;background:#007bff;color:#fff;border-radius:8px;cursor:pointer}
  #controls{display:flex;gap:8px;margin-top:10px;align-items:center}
  small{color:#666}
</style>
</head>
<body>
<div id="chat" role="region" aria-label="شات بوت ذكي">
  <h1>شات بوت ذكي مع IndexedDB</h1>
  <div id="messages" aria-live="polite"></div>

  <div id="inputRow">
    <input id="text" placeholder="اكتب سؤالك..." autocomplete="off" />
    <button id="send">إرسال</button>
  </div>

  <div id="controls">
    <button id="clearLocal">مسح الذاكرة المحلية</button>
    <small>المطابقة المحلية تستخدم تشابه نصي؛ إذا لم توجد إجابة مناسبة يتم استدعاء الخادم.</small>
  </div>
</div>

<script>
/* ======= إعدادات ======= */
const API_ENDPOINT = 'YOUR_API_ENDPOINT'; // استبدل برابط الخادم الوسيط الآمن
const DB_NAME = 'smart-chat-db';
const STORE_NAME = 'qa_store';
const MAX_MEMORY = 1000; // حد عدد السجلات المحلية

/* ======= واجهة المستخدم ======= */
const messagesEl = document.getElementById('messages');
const textEl = document.getElementById('text');
const sendBtn = document.getElementById('send');
const clearBtn = document.getElementById('clearLocal');

function renderMessage(text, cls, meta){
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  messagesEl.appendChild(d);
  if(meta){
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    messagesEl.appendChild(m);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

/* ======= IndexedDB مساعد بسيط ======= */
function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains(STORE_NAME)){
        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
        store.createIndex('createdAt', 'createdAt', { unique: false });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function addRecord(record){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.add(record).onsuccess = () => resolve();
    tx.oncomplete = () => db.close();
    tx.onerror = e => reject(e.target.error);
  });
}

async function getAllRecords(){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req = store.getAll();
    req.onsuccess = () => { resolve(req.result || []); db.close(); };
    req.onerror = e => reject(e.target.error);
  });
}

async function clearAll(){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.clear().onsuccess = () => resolve();
    tx.oncomplete = () => db.close();
    tx.onerror = e => reject(e.target.error);
  });
}

/* ======= تمثيل نصي بسيط وقياس تشابه ======= */
/* تنظيف وتقطيع الكلمات */
function tokenize(text){
  return text.toLowerCase()
    .replace(/[^\p{L}\p{N}\s]+/gu, ' ')
    .split(/\s+/)
    .filter(Boolean);
}

/* قائمة كلمات توقف بسيطة بالعربية والإنجليزية */
const STOPWORDS = new Set([
  'و','في','على','من','إلى','عن','هو','هي','هذا','هذه','ذلك','تلك','ما','لم','لن','لا','نعم',
  'the','is','a','an','of','to','in','for','and','or','that','it'
]);

function termFreqVector(text){
  const tokens = tokenize(text).filter(t => !STOPWORDS.has(t));
  const freqs = {};
  tokens.forEach(t => freqs[t] = (freqs[t]||0) + 1);
  return freqs;
}

function dotProduct(a,b){
  let s = 0;
  for(const k in a) if(b[k]) s += a[k]*b[k];
  return s;
}
function magnitude(a){
  let s = 0;
  for(const k in a) s += a[k]*a[k];
  return Math.sqrt(s);
}
function cosineSim(a,b){
  const num = dotProduct(a,b);
  const den = magnitude(a)*magnitude(b);
  return den === 0 ? 0 : num/den;
}

/* ======= منطق البحث المحلي الذكي ======= */
async function findBestLocalMatch(query, threshold=0.62){
  const records = await getAllRecords();
  if(!records.length) return null;
  const qVec = termFreqVector(query);
  let best = null;
  for(const r of records){
    const rVec = r.vector || termFreqVector(r.q);
    const sim = cosineSim(qVec, rVec);
    if(!best || sim > best.sim) best = { record: r, sim };
  }
  if(best && best.sim >= threshold) return best;
  return null;
}

/* ======= استدعاء الخادم الوسيط ======= */
async function queryAPI(userText, contextRecords){
  // يرسل النص وسياق محدود للخادم؛ الخادم يتعامل مع مزود الـ AI ومفتاحه
  const payload = { message: userText, context: contextRecords.slice(-10) };
  const res = await fetch(API_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if(!res.ok) throw new Error('API error ' + res.status);
  return res.json();
}

/* ======= إدارة الذاكرة المحلية بعد الحصول على إجابة ======= */
async function storeQA(q, a){
  const vector = termFreqVector(q);
  await addRecord({ q, a, vector, createdAt: Date.now() });
  // ضبط الحد الأقصى للذاكرة
  const all = await getAllRecords();
  if(all.length > MAX_MEMORY){
    // احذف الأقدم
    const sorted = all.sort((x,y)=>x.createdAt - y.createdAt);
    const toDelete = sorted.slice(0, all.length - MAX_MEMORY);
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    toDelete.forEach(item => store.delete(item.id));
    tx.oncomplete = () => db.close();
  }
}

/* ======= تفاعل المستخدم ======= */
sendBtn.addEventListener('click', onSend);
textEl.addEventListener('keydown', e => { if(e.key === 'Enter') onSend(); });

async function onSend(){
  const text = textEl.value.trim();
  if(!text) return;
  renderMessage(text, 'user');
  textEl.value = '';
  // أولاً حاول المطابقة المحلية الذكية
  renderMessage('جارٍ البحث محلياً عن إجابة مناسبة...', 'bot');
  try{
    const best = await findBestLocalMatch(text, 0.62);
    if(best){
      // استبدال الرسالة المؤقتة
      const lastBot = messagesEl.querySelector('.bot:last-child');
      if(lastBot) lastBot.textContent = best.record.a + ' (من الذاكرة المحلية)';
      return;
    }
    // لم نجد تطابقاً جيداً، استدعي الخادم
    const lastBot = messagesEl.querySelector('.bot:last-child');
    if(lastBot) lastBot.textContent = 'جارٍ الاتصال بالخادم للحصول على إجابة ذكية...';
    // جلب بعض السجلات الأخيرة كسياق
    const context = (await getAllRecords()).slice(-8).map(r => ({ q: r.q, a: r.a }));
    const apiRes = await queryAPI(text, context);
    const answer = apiRes.answer || 'عذراً، لم أتمكن من توليد إجابة.';
    if(lastBot) lastBot.textContent = answer;
    // خزّن الزوج محلياً مع المتجه
    await storeQA(text, answer);
  }catch(err){
    const lastBot = messagesEl.querySelector('.bot:last-child');
    if(lastBot) lastBot.textContent = 'حدث خطأ في الاتصال بالخادم.';
    console.error(err);
  }
}

/* ======= زر مسح الذاكرة المحلية ======= */
clearBtn.addEventListener('click', async ()=>{
  if(!confirm('هل تريد مسح كل الذاكرة المحلية؟')) return;
  await clearAll();
  renderMessage('تم مسح الذاكرة المحلية.', 'bot');
});

/* ======= تحميل بعض الرسائل الترحيبية من الذاكرة إن وجدت ======= */
(async function init(){
  const recs = await getAllRecords();
  if(recs.length){
    renderMessage('تم تحميل الذاكرة المحلية. عدد السجلات: ' + recs.length, 'bot');
  } else {
    renderMessage('مرحباً! اسألني أي شيء. سأتعلم من المحادثات وأحاول الإجابة محلياً قبل الاتصال بالخادم.', 'bot');
  }
})();
</script>
</body>
</html>
