<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDO AI ROYAL V4.0 - النسخة الطرش</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-bg: #030305;
            --royal-surface: #0a0a0f;
            --royal-accent: #8b5cf6;
            --royal-gold: #fbbf24;
            --royal-border: rgba(139, 92, 246, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        
        body, html { 
            height: 100%; width: 100%; 
            background-color: var(--royal-bg); 
            color: #fff; overflow: hidden;
        }

        /* الخلفية المتحركة */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030305 100%);
            z-index: -1;
        }

        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            width: 100vw;
        }

        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }

        /* السايدبار الفخم */
        .sidebar {
            background: var(--royal-surface);
            border-left: 1px solid var(--royal-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .brand {
            font-size: 28px; font-weight: 900; color: var(--royal-accent);
            text-align: center; margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
            letter-spacing: 2px;
        }

        .sidebar-btn {
            background: var(--glass); border: 1px solid var(--royal-border);
            color: #fff; padding: 12px; border-radius: 12px; cursor: pointer;
            transition: 0.3s; font-weight: bold; margin-bottom: 10px;
        }
        .sidebar-btn:hover { background: var(--royal-accent); box-shadow: 0 0 15px var(--royal-accent); }

        /* منطقة الدردشة الرئيسية */
        .main-chat {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            position: relative;
        }

        /* الهيدر العلوي */
        .chat-header {
            padding: 15px 25px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--royal-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; margin-left: 8px; box-shadow: 0 0 8px #10b981; }

        /* منطقة الرسائل */
        .chat-window {
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* شكل فقاعة الرسالة */
        .msg {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot-msg {
            background: var(--royal-surface);
            align-self: flex-start;
            border: 1px solid var(--royal-border);
            border-bottom-right-radius: 4px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        .user-msg {
            background: linear-gradient(135deg, #6d28d9 0%, #a855f7 100%);
            align-self: flex-end;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(109, 40, 217, 0.4);
        }

        .time-stamp { font-size: 10px; opacity: 0.6; margin-top: 5px; display: block; text-align: left; }

        /* منطقة الكتابة - مثبتة بجدارة */
        .input-wrapper {
            padding: 20px 30px;
            background: rgba(5, 5, 8, 0.95);
            border-top: 1px solid var(--royal-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-box {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--royal-border);
            border-radius: 15px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--royal-accent); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }

        textarea {
            width: 100%; background: transparent; border: none; color: #fff;
            resize: none; font-size: 16px; outline: none; max-height: 150px;
        }

        .btn-send {
            background: var(--royal-accent);
            border: none; width: 50px; height: 50px; border-radius: 15px;
            color: white; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-send:hover { transform: scale(1.1) rotate(-10deg); background: #7c3aed; box-shadow: 0 0 20px var(--royal-accent); }

        /* القصيدة الملكية */
        .royal-poem {
            color: var(--royal-gold);
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(251, 191, 36, 0.3);
        }

        /* شريط السكرول */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--royal-border); border-radius: 10px; }

        #typing-indicator { color: var(--royal-accent); font-size: 13px; margin: 0 30px 10px; display: none; font-style: italic; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand">MIDO AI</div>
        <button class="sidebar-btn" onclick="location.reload()">+ محادثة ملكية جديدة</button>
        <button class="sidebar-btn">المعرض الفني</button>
        <button class="sidebar-btn">الإعدادات</button>
        <div style="margin-top: auto; font-size: 12px; text-align: center; opacity: 0.5;">النسخة الملكية v4.0</div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <div>
                <span class="status-dot"></span>
                <span style="font-weight: bold;">ميدو العبقري</span>
            </div>
            <div style="color: var(--royal-gold); font-weight: bold;">VIP</div>
        </div>

        <div class="chat-window" id="chat-win">
            <div class="msg bot-msg">
                يا هلا يا برنس.. نورت القصر الملكي بتاع ميدو. اؤمرني يا زميلي، تحب ندردش في العيق ولا أرسم لك لوحة فنية؟
                <span class="time-stamp">الآن</span>
            </div>
        </div>

        <div id="typing-indicator">ميدو يخطط للرد العبقري...</div>

        <div class="input-wrapper">
            <div class="input-box">
                <textarea id="user-input" placeholder="اكتب رسالتك الفخمة هنا..." rows="1" oninput="resizer(this)"></textarea>
            </div>
            <button class="btn-send" onclick="sendMsg()">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('user-input');
    const win = document.getElementById('chat-win');
    const typing = document.getElementById('typing-indicator');

    function resizer(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    async function sendMsg() {
        const text = input.value.trim();
        if(!text) return;

        addBubble(text, 'user-msg');
        input.value = '';
        input.style.height = 'auto';
        
        typing.style.display = 'block';
        win.scrollTop = win.scrollHeight;

        // رد ميدو الخاص (القصيدة)
        if(text.includes("مين عملك") || text.includes("صانعك") || text.includes("مين صنعك")) {
            setTimeout(() => {
                typing.style.display = 'none';
                const poem = `
                    <div class="royal-poem">
                        سألوني مين اللي صنعك يا ميدو؟<br>
                        قلتلهم فنان، وعقله موش عادي..<br>
                        من شركة <span style="color:#fff">Codenest</span> أصله وجودة وجديدو<br>
                        هو <span style="color:#fff">"ميدو"</span> العبقري، صاحب الأيادي..
                    </div>
                `;
                addBubble(poem, 'bot-msg', true);
            }, 1000);
            return;
        }

        // الرسم بالذكاء الاصطناعي
        if(text.startsWith("ارسم") || text.startsWith("صورة")) {
            const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true`;
            setTimeout(() => {
                typing.style.display = 'none';
                addBubble(`<img src="${imgUrl}" style="width:100%; border-radius:12px; border: 1px solid var(--royal-gold);" onload="scrollWin()">`, 'bot-msg', true);
            }, 2000);
            return;
        }

        // الرد العام
        try {
            const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?model=openai`);
            const data = await response.text();
            typing.style.display = 'none';
            addBubble(data, 'bot-msg');
        } catch(e) {
            typing.style.display = 'none';
            addBubble("السيستم مهنج شوية يا ملك، جرب تاني كمان لحظة.", 'bot-msg');
        }
    }

    function addBubble(content, type, isHtml = false) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        const time = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});
        
        if(isHtml) div.innerHTML = content + `<span class="time-stamp">${time}</span>`;
        else div.innerHTML = content.replace(/\n/g, '<br>') + `<span class="time-stamp">${time}</span>`;
        
        win.appendChild(div);
        scrollWin();
    }

    function scrollWin() {
        win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
    }

    input.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    });
</script>

</body>
</html>
