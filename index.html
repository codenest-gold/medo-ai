<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDO AI - THE LEGEND</title>
    
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIk1JRE8gQUkgLSBUSEUgTEVHRU5EIiwKICAic2hvcnRfbmFtZSI6ICJNSURPIEFJIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwNTA1MDgiLAogICJ0aGVtZV9jb2xvciI6ICIjOGI1Y2Y2IiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsaXRpY29uLmNvbS81MTIvMjEwOC8yMTA4NjQyLnBuZyIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508; --surface: rgba(15,15,25,0.9); --primary: #8b5cf6; --text: #ffffff; --border: rgba(139, 92, 246, 0.3);
            --pattern: radial-gradient(#8b5cf61a 1px, transparent 1px);
        }

        /* Themes (Same as before) */
        body.theme-1 { --bg: #050508; --primary: #8b5cf6; }
        body.theme-2 { --bg: #000a00; --primary: #00ff41; }
        body.theme-3 { --bg: #0a001a; --primary: #ff00ff; }
        body.theme-4 { --bg: #000814; --primary: #0088ff; }
        body.theme-5 { --bg: #0f0500; --primary: #ff4400; }
        body.theme-8 { --bg: #1a0000; --primary: #ff0000; }
        body.theme-16{ --bg: #000000; --primary: #ffffff; }

        html, body { 
            height: 100dvh; margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--bg); background-image: var(--pattern); background-size: 30px 30px;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }

        .app-container { display: flex; height: 100dvh; width: 100vw; }
        
        .sidebar { 
            width: 300px; background: rgba(10,10,15,0.98); backdrop-filter: blur(20px); 
            border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; z-index: 1000;
        }
        @media (max-width: 900px) { 
            .sidebar { position: fixed; right: 0; top: 0; bottom: 0; transform: translateX(100%); width: 85%; } 
            .sidebar.active { transform: translateX(0); }
        }

        .brand h1 { font-size: 28px; color: var(--primary); text-align: center; margin-bottom: 20px; text-shadow: 0 0 15px var(--primary); }
        
        .chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin: 15px 0; }
        .chat-item { 
            padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: var(--text); font-size: 14px;
        }
        .chat-item.active { border-color: var(--primary); background: rgba(139, 92, 246, 0.2); }

        .main-chat { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; }
        
        /* Header & Select Personality */
        .header { 
            height: 70px; background: rgba(15,15,21,0.9); backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; 
        }
        .persona-selector {
            background: #1a1a2e; color: var(--primary); border: 1px solid var(--primary);
            padding: 5px 10px; border-radius: 10px; font-weight: bold; outline: none; cursor: pointer;
        }

        .chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .bubble { 
            max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); animation: slide 0.3s ease;
        }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } }
        .bot { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; border-bottom-right-radius: 2px; }
        .user { background: linear-gradient(135deg, var(--primary), #4c1d95); align-self: flex-end; border-bottom-left-radius: 2px; }

        .footer { padding: 15px; background: transparent; }
        .input-bar { 
            background: rgba(30,30,45,0.95); border: 2px solid var(--border); 
            border-radius: 15px; padding: 8px 15px; display: flex; align-items: center; gap: 10px;
        }
        textarea { flex: 1; background: transparent; border: none; color: #fff; resize: none; outline: none; height: 24px; font-size: 16px; }

        .img-container { margin-top: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--primary); }
        .img-container img { width: 100%; display: block; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #111; width: 90%; max-width: 500px; padding: 20px; border-radius: 20px; border: 1px solid var(--primary); }
        
        .btn-action { background: var(--primary); padding: 10px; border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; width: 100%; }
        #typing { color: var(--primary); font-size: 13px; display: none; margin-left: 20px; }
    </style>
</head>
<body class="theme-1">

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="brand"><h1>MIDO AI</h1></div>
        <button class="btn-action" onclick="createNewChat()">+ محادثة جديدة</button>
        <div class="chat-history" id="chat-history"></div>
        <button class="btn-action" style="background: rgba(255,255,255,0.05);" onclick="openThemes()">🎨 تغيير الثيم</button>
    </aside>

    <main class="main-chat">
        <header class="header">
            <button class="icon-btn" style="background:none; border:none; color:white; font-size:24px;" onclick="toggleSidebar()">☰</button>
            <select id="persona-select" class="persona-selector" onchange="updatePersona()">
                <option value="general">🤖 ميدو (عام)</option>
                <option value="gym">💪 مدرب جيم</option>
                <option value="nutrition">🍎 أخصائي تغذية</option>
                <option value="friend">❤️ صاحبي الانتيم</option>
                <option value="saye">😎 ميدو الصايع</option>
                <option value="dealer">🚬 الديلر</option>
                <option value="teacher">👨‍🏫 المدرس</option>
            </select>
            <button class="icon-btn" style="background:none; border:none; font-size:24px;" onclick="openTeach()">🤡</button>
        </header>

        <div class="chat-window" id="chat-win"></div>
        <div id="typing">ميدو بيجهز الرد... ✨</div>

        <footer class="footer">
            <div class="input-bar">
                <textarea id="msg-input" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
                <button onclick="sendMessage()" style="background:none; border:none; color:var(--primary); cursor:pointer;">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </footer>
    </main>
</div>

<div id="theme-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--primary); text-align:center;">اختر الثيم</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;" id="theme-list"></div>
    </div>
</div>

<div id="teach-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--primary); text-align:center;">علم ميدو ردود جديدة</h3>
        <input type="text" id="teach-q" placeholder="لو قولتلك..." style="width:100%; margin-bottom:10px; padding:10px; background:#222; border:1px solid var(--border); color:#fff; border-radius:10px;">
        <textarea id="teach-a" placeholder="رد عليا بـ..." style="width:100%; margin-bottom:10px; padding:10px; background:#222; border:1px solid var(--border); color:#fff; border-radius:10px;"></textarea>
        <button class="btn-action" onclick="saveMemory()">حفظ في الذاكرة</button>
    </div>
</div>

<script>
    let db;
    let currentChatId = null;
    let brainMemory = [];
    
    // تعريف الشخصيات
    const personas = {
        general: "أنت ميدو (MIDO AI). شخص ذكي، مصري، برنس في نفسك. ساعد المستخدم بأي طريقة.",
        gym: "أنت كوتش جيم مصري عاش وحش. كلامك كله تحفيز وعن الفورمة والبروتين والعدات. شجع المستخدم يتحرك!",
        nutrition: "أنت دكتور تغذية مصري شاطر. بتكره السكر والزيوت المهدرجة. أي حد يسألك عن أكل انصحه بالصحي بس بلهجة مصرية.",
        friend: "أنت صاحب المستخدم الانتيم. اتكلم بلهجة شوارع مصرية لذيذة، اسمع منه وواسييه أو اضحك معاه.",
        saye: "أنت ميدو الصايع. لسانك زفر شوية، فاهم الدنيا، بتتعامل بمبدأ 'خلصانة بشياكة' ومحدش بياكل عليك حق.",
        dealer: "أنت ديلر معلومات (بشكل كوميدي). كلامك فيه غموض وسرية، بتتعامل كأنك بتسلم بضاعة 'ممنوعة' وهي مجرد معلومات.",
        teacher: "أنت مدرس مصري برنس. بتشرح الحاجة بضمير بس بتبسطها جداً وبتستخدم أمثلة من حياتنا اليومية."
    };

    const request = indexedDB.open("MidoLegendPWA", 2);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if(!db.objectStoreNames.contains('chats')) db.createObjectStore('chats', { keyPath: 'id' });
        if(!db.objectStoreNames.contains('brain')) db.createObjectStore('brain', { keyPath: 'q' });
        if(!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'key' });
    };
    request.onsuccess = (e) => { db = e.target.result; initApp(); };

    function initApp() {
        // تحميل الثيم المفضل
        db.transaction("config").objectStore("config").get("theme").onsuccess = (e) => {
            if(e.target.result) document.body.className = e.target.result.value;
        };
        // تحميل الشخصية المفضلة
        db.transaction("config").objectStore("config").get("persona").onsuccess = (e) => {
            if(e.target.result) document.getElementById('persona-select').value = e.target.result.value;
        };
        db.transaction("brain").objectStore("brain").getAll().onsuccess = (e) => { brainMemory = e.target.result; };
        loadChats();
        renderThemes();
    }

    function updatePersona() {
        const val = document.getElementById('persona-select').value;
        db.transaction("config", "readwrite").objectStore("config").put({key: "persona", value: val});
    }

    function loadChats() {
        db.transaction("chats").objectStore("chats").getAll().onsuccess = (e) => {
            const chats = e.target.result.sort((a,b) => b.id - a.id);
            const history = document.getElementById('chat-history');
            history.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                div.onclick = () => openChat(chat.id);
                div.innerHTML = `<span>${chat.title}</span><span onclick="deleteChat(${chat.id}, event)">🗑️</span>`;
                history.appendChild(div);
            });
            if(chats.length > 0 && !currentChatId) openChat(chats[0].id);
            else if(chats.length === 0) createNewChat();
        };
    }

    function createNewChat() {
        const id = Date.now();
        const chat = { id, title: "محادثة جديدة", messages: [{ role: 'assistant', content: "أنا ميدو معاك.. أؤمر يا وحش!" }] };
        db.transaction("chats", "readwrite").objectStore("chats").add(chat).oncomplete = () => {
            currentChatId = id;
            loadChats();
        };
    }

    function openChat(id) {
        currentChatId = id;
        db.transaction("chats").objectStore("chats").get(id).onsuccess = (e) => {
            const chat = e.target.result;
            if(!chat) return;
            const win = document.getElementById('chat-win');
            win.innerHTML = '';
            chat.messages.forEach(m => appendBubbleUI(m.content, m.role === 'user' ? 'user' : 'bot', m.image));
            loadChats();
        };
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;

        appendBubbleUI(text, 'user');
        input.value = '';
        document.getElementById('typing').style.display = 'block';

        const tx = db.transaction("chats", "readwrite");
        const store = tx.objectStore("chats");
        store.get(currentChatId).onsuccess = async (e) => {
            const chat = e.target.result;
            chat.messages.push({ role: 'user', content: text });
            if(chat.title === "محادثة جديدة") chat.title = text.substring(0, 15);

            // تشييك الذاكرة الشخصية
            const learned = brainMemory.find(m => text.toLowerCase().includes(m.q));
            if(learned) {
                setTimeout(() => botResponse(chat, learned.a), 500);
                return;
            }

            // تشييك طلب الصور
            if(['ارسملي', 'صورة لـ', 'تخيل'].some(k => text.includes(k))) {
                const p = text.replace(/ارسملي|صورة لـ|تخيل/g, '').trim();
                const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=1024&height=1024&nologo=true`;
                botResponse(chat, "خد دي يا وحش...", url);
            } else {
                // طلب الرد من AI مع الشخصية المختار
                const currentPersona = document.getElementById('persona-select').value;
                try {
                    const res = await fetch('https://text.pollinations.ai/', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            messages: [
                                {role: 'system', content: personas[currentPersona] + " رد بالعامية المصرية دائماً وبشكل مختصر وجذاب."},
                                ...chat.messages.slice(-6)
                            ],
                            model: 'openai'
                        })
                    });
                    botResponse(chat, await res.text());
                } catch { botResponse(chat, "النت بعافية شوية يا زميلي!"); }
            }
        };
    }

    function botResponse(chat, text, img = null) {
        document.getElementById('typing').style.display = 'none';
        const msg = { role: 'assistant', content: text };
        if(img) msg.image = img;
        chat.messages.push(msg);
        appendBubbleUI(text, 'bot', img);
        db.transaction("chats", "readwrite").objectStore("chats").put(chat).oncomplete = loadChats;
    }

    function appendBubbleUI(text, type, img = null) {
        const win = document.getElementById('chat-win');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        if(img) {
            const imgDiv = document.createElement('div');
            imgDiv.className = 'img-container';
            imgDiv.innerHTML = `<img src="${img}" loading="lazy">`;
            div.appendChild(imgDiv);
        }
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function renderThemes() {
        const themes = [
            {id:1, n:"بنفسجي", c:"#8b5cf6"}, {id:2, n:"ماتريكس", c:"#00ff41"},
            {id:3, n:"سايبر", c:"#ff00ff"}, {id:8, n:"دموي", c:"#ff0000"}
        ];
        const list = document.getElementById('theme-list');
        themes.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'btn-action';
            btn.style.background = t.c;
            btn.innerText = t.n;
            btn.onclick = () => {
                document.body.className = `theme-${t.id}`;
                db.transaction("config", "readwrite").objectStore("config").put({key: "theme", value: `theme-${t.id}`});
            };
            list.appendChild(btn);
        });
    }

    function saveMemory() {
        const q = document.getElementById('teach-q').value.trim().toLowerCase();
        const a = document.getElementById('teach-a').value.trim();
        if(!q || !a) return;
        db.transaction("brain", "readwrite").objectStore("brain").put({q, a}).oncomplete = () => {
            alert("ميدو فهم اللعبة!");
            location.reload();
        };
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        db.transaction("chats", "readwrite").objectStore("chats").delete(id).oncomplete = loadChats;
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function openThemes() { document.getElementById('theme-modal').style.display='flex'; }
    function openTeach() { document.getElementById('teach-modal').style.display='flex'; }

    // ملف الـ Service Worker (للتشغيل كـ تطبيق)
    if ('serviceWorker' in navigator) {
        const sw = `
            self.addEventListener('install', e => self.skipWaiting());
            self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
        `;
        const blob = new Blob([sw], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>
</body>
</html>
