<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDO AI v3.5 - النسخة الفاخرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c084fc;
            --bg: #050507;
            --surface: #101014;
            --border: #22222a;
            --text: #ffffff;
            --user-bubble: linear-gradient(135deg, #7c3aed 0%, #c084fc 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        
        /* ضبط الطول ليتناسب مع شاشات الموبايل والمتصفحات */
        html, body { 
            height: 100%; 
            width: 100%; 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; /* لمنع السكرول الخارجي */
        }

        body { 
            display: grid; 
            grid-template-columns: 280px 1fr; /* تقسيم الشاشة لسايدبار ومحتوى */
        }

        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; } /* إخفاء السايدبار في الموبايل */
            .sidebar { display: none; }
        }

        /* Sidebar */
        .sidebar { 
            background: var(--surface); 
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column;
            height: 100vh;
        }
        .brand { padding: 25px; font-size: 24px; font-weight: 900; color: var(--primary); text-align: center; border-bottom: 1px solid var(--border); }
        .new-btn { margin: 15px; padding: 12px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }

        /* Main Chat Container */
        .main { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; /* طول الشاشة كاملة */
            position: relative;
            background: radial-gradient(circle at top right, #111, #050507);
        }
        
        /* منطقة الرسائل */
        .chat-window { 
            flex: 1; /* تأخذ كل المساحة المتاحة ماعدا منطقة الكتابة */
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            padding-bottom: 100px; /* مساحة أمان عشان الرسايل متداريش ورا مربع الكتابة */
        }
        
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 16px; line-height: 1.6; animation: slideUp 0.3s ease-out; word-wrap: break-word; }
        .bot { background: #1a1a22; align-self: flex-start; border-bottom-right-radius: 5px; border: 1px solid var(--border); }
        .user { background: var(--user-bubble); align-self: flex-end; border-bottom-left-radius: 5px; }

        /* منطقة الكتابة - مثبتة في الأسفل */
        .input-area {
            position: absolute; /* تثبيت مطلق داخل الـ main */
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: rgba(16, 16, 20, 0.98);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            z-index: 999; /* التأكد إنها فوق كل شيء */
        }

        .input-container {
            flex: 1;
            background: #1a1a22;
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 8px 15px;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            font-size: 16px;
            max-height: 100px;
            outline: none;
            display: block;
            line-height: 1.5;
        }

        .send-btn {
            background: var(--primary);
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #typing { position: absolute; bottom: 85px; right: 20px; font-size: 12px; color: var(--primary); display: none; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand">MIDO AI</div>
    <button class="new-btn" onclick="location.reload()">+ محادثة جديدة</button>
</div>

<div class="main">
    <div class="chat-window" id="chat-window">
        <div class="bubble bot">إيه يا زميلي.. نورت الشات الفخم. أنا ميدو، اؤمرني عايز ندردش ولا أرسم لك صورة من خيالك؟</div>
    </div>
    
    <div id="typing">ميدو بيفكر...</div>

    <div class="input-area">
        <div class="input-container">
            <textarea id="chat-in" placeholder="اكتب رسالتك هنا..." rows="1" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" onclick="processInput()">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    const chatIn = document.getElementById('chat-in');
    const chatWindow = document.getElementById('chat-window');
    const typing = document.getElementById('typing');

    function autoResize(t) {
        t.style.height = 'auto';
        t.style.height = (t.scrollHeight) + 'px';
    }

    async function processInput() {
        const val = chatIn.value.trim();
        if (!val) return;

        addMsg(val, 'user');
        chatIn.value = "";
        chatIn.style.height = 'auto';
        
        typing.style.display = 'block';

        if (val.includes("مين عملك") || val.includes("من صنعك")) {
            setTimeout(() => {
                typing.style.display = 'none';
                addMsg(`
                    <div style="text-align:center; color:#d8b4fe; font-style:italic;">
                        سألوني مين اللي صنعك يا ميدو؟<br>
                        قلتلهم فنان، وعقله موش عادي..<br>
                        من شركة <b>Codenest</b> أصله وجودة وجديدو<br>
                        هو "ميدو" العبقري، صاحب الأيادي..
                    </div>
                `, 'bot', true);
            }, 800);
            return;
        }

        if (val.startsWith("ارسم") || val.startsWith("صورة")) {
            const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(val)}?width=1024&height=1024&nologo=true`;
            setTimeout(() => {
                typing.style.display = 'none';
                addMsg(`<img src="${imgUrl}" style="width:100%; border-radius:10px; margin-top:5px;" onload="scrollBtm()">`, 'bot', true);
            }, 1500);
            return;
        }

        try {
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(val)}?model=openai`);
            const text = await res.text();
            typing.style.display = 'none';
            addMsg(text, 'bot');
        } catch (e) {
            typing.style.display = 'none';
            addMsg("السيرفر واقع يا برنس، جرب كمان شوية.", 'bot');
        }
    }

    function addMsg(content, sender, isHtml = false) {
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        if (isHtml) div.innerHTML = content;
        else div.innerText = content;
        chatWindow.appendChild(div);
        scrollBtm();
    }

    function scrollBtm() {
        chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
    }

    chatIn.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            processInput();
        }
    });
</script>

</body>
</html>
