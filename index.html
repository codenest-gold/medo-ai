<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDO AI - ULTIMATE 3D EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305; 
            --surface: rgba(15, 15, 25, 0.8); 
            --primary: #8b5cf6; 
            --accent: #fbbf24; 
            --text: #ffffff; 
            --border: rgba(139, 92, 246, 0.4);
            --glow: rgba(139, 92, 246, 0.2);
        }

        /* الثيمات المطورة */
        body.theme-1 { --primary: #8b5cf6; --border: rgba(139, 92, 246, 0.5); --glow: rgba(139, 92, 246, 0.3); }
        body.theme-2 { --bg: #000a00; --primary: #00ff41; --border: rgba(0, 255, 65, 0.5); --glow: rgba(0, 255, 65, 0.2); }
        body.theme-3 { --bg: #0a000a; --primary: #ff00ff; --border: rgba(255, 0, 255, 0.5); --glow: rgba(255, 0, 255, 0.2); }
        body.theme-4 { --bg: #00050a; --primary: #0088ff; --border: rgba(0, 136, 255, 0.5); --glow: rgba(0, 136, 255, 0.2); }

        html, body { 
            height: 100dvh; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background-color: var(--bg);
            color: var(--text);
            perspective: 1000px;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* خلفية تفاعلية */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--glow) 0%, transparent 70%);
            pointer-events: none; z-index: -1;
        }

        .app-container { display: flex; height: 100dvh; width: 100vw; overflow: hidden; }
        
        /* Sidebar 3D */
        .sidebar { 
            width: 320px; background: rgba(10, 10, 15, 0.9); 
            backdrop-filter: blur(20px); border-left: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px; z-index: 100;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        
        @media (max-width: 900px) { 
            .sidebar { position: fixed; right: 0; transform: translateX(100%); width: 85%; height: 100%; } 
            .sidebar.active { transform: translateX(0); }
        }

        .brand h1 { 
            font-size: 32px; color: var(--primary); text-align: center; margin-bottom: 25px; 
            text-shadow: 0 0 20px var(--primary); font-weight: 900; letter-spacing: 2px;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), #6d28d9); 
            color: #fff; padding: 14px; border: none; border-radius: 15px; 
            font-weight: bold; cursor: pointer; margin-bottom: 15px; 
            box-shadow: 0 4px 15px var(--glow); border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary); }

        .chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-item { 
            padding: 15px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-item.active { background: var(--glow); border-color: var(--primary); box-shadow: inset 0 0 10px var(--glow); }

        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; }
        
        .header { 
            height: 70px; background: rgba(5, 5, 10, 0.8); 
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px; 
        }

        .chat-window { 
            flex: 1; overflow-y: auto; padding: 25px; display: flex; 
            flex-direction: column; gap: 20px; scroll-behavior: smooth;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
        
        /* فقاعات الشات الـ 3D */
        .bubble { 
            max-width: 80%; padding: 15px 20px; border-radius: 20px; 
            position: relative; animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            line-height: 1.6;
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .bot { 
            align-self: flex-start; background: var(--surface); 
            border: 1px solid var(--border); border-bottom-right-radius: 5px;
            color: #efefef; transform-style: preserve-3d;
        }
        .bot::after { content: 'MIDO AI'; position: absolute; top: -20px; right: 10px; font-size: 10px; color: var(--primary); font-weight: bold; }

        .user { 
            align-self: flex-end; background: linear-gradient(135deg, var(--primary), #4c1d95); 
            color: white; border-bottom-left-radius: 5px;
            box-shadow: 0 10px 25px var(--glow);
        }

        /* منطقة الكتابة المتطورة */
        .footer-area { padding: 20px; background: transparent; }
        .input-bar { 
            background: rgba(20, 20, 30, 0.9); border: 2px solid var(--border); 
            border-radius: 20px; padding: 10px 20px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3); backdrop-filter: blur(10px);
        }
        textarea { 
            flex: 1; background: transparent; border: none; color: #fff; 
            outline: none; font-size: 16px; height: 30px; max-height: 150px;
        }

        .send-btn { 
            background: var(--primary); width: 50px; height: 50px; border-radius: 15px; 
            border: none; color: #fff; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; transition: 0.2s;
        }
        .send-btn:hover { transform: scale(1.1) rotate(-10deg); background: var(--accent); }

        /* Loading */
        #typing { color: var(--primary); font-weight: bold; padding: 10px 30px; display: none; font-style: italic; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: #111; border: 2px solid var(--primary); padding: 30px; border-radius: 25px; width: 90%; max-width: 500px; }
    </style>
</head>
<body class="theme-1">

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="brand"><h1>MIDO AI</h1></div>
        <button class="btn-primary" onclick="createNewChat()">+ محادثة جديدة</button>
        <div class="chat-history" id="chat-history"></div>
        <button class="btn-primary" style="background: rgba(255,255,255,0.05); margin-top: auto;" onclick="document.getElementById('theme-modal').style.display='flex'">🎨 ثيمات ملكية</button>
    </aside>

    <main class="main-chat">
        <header class="header">
            <button class="send-btn" style="width: 40px; height: 40px;" onclick="toggleSidebar()">☰</button>
            <h2 id="current-title" style="color: var(--primary); font-weight: 900;">ميدو برو</h2>
            <div style="width: 40px;"></div>
        </header>

        <div class="chat-window" id="chat-win"></div>
        <div id="typing">ميدو بيفكر... ✨</div>

        <footer class="footer-area">
            <div class="input-bar">
                <textarea id="msg-input" placeholder="اسأل ميدو أي حاجة..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </footer>
    </main>
</div>

<div id="theme-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="text-align:center; margin-bottom:20px;">اختر ثيمك يا برنس</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <button class="btn-primary" onclick="setTheme(1)">بنفسجي نيون</button>
            <button class="btn-primary" style="background:#00ff41; color:#000" onclick="setTheme(2)">ماتريكس</button>
            <button class="btn-primary" style="background:#ff00ff" onclick="setTheme(3)">سايبر بانك</button>
            <button class="btn-primary" style="background:#0088ff" onclick="setTheme(4)">أزرق ملكي</button>
        </div>
    </div>
</div>

<script>
    let currentMessages = [];
    
    // إعدادات ميدو (System Prompt)
    const SYSTEM_PROMPT = "أنت ميدو (MIDO AI)، مساعد ذكي ومحترف جداً وبرنس في نفسك. اسمك ميدو. صانعك هو المطور ميدو ورقم هاتفه هو +201124680211. رد دائماً بلهجة مصرية روشة ومحترمة في نفس الوقت. لا تقل أبداً أنك ChatGPT أو OpenAI.";

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;

        appendBubble(text, 'user');
        input.value = '';
        input.style.height = 'auto';
        
        document.getElementById('typing').style.display = 'block';

        // استخدام الـ API الجديد مع الـ System Prompt لفرض الشخصية
        try {
            const response = await fetch('https://text.pollinations.ai/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: 'system', content: SYSTEM_PROMPT },
                        ...currentMessages.slice(-5), // آخر 5 رسائل عشان الذاكرة
                        { role: 'user', content: text }
                    ],
                    model: 'openai', // استخدام موديل أوبن إيه آي بجودة عالية
                    seed: 42
                })
            });

            const botText = await response.text();
            appendBubble(botText, 'bot');
            currentMessages.push({ role: 'user', content: text });
            currentMessages.push({ role: 'assistant', content: botText });
            
        } catch(e) {
            appendBubble("معلش يا برنس السيرفر واقع، جرب كمان شوية!", 'bot');
        } finally {
            document.getElementById('typing').style.display = 'none';
        }
    }

    function appendBubble(text, type) {
        const win = document.getElementById('chat-win');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function setTheme(n) { document.body.className = `theme-${n}`; document.getElementById('theme-modal').style.display='none'; }
    function createNewChat() { document.getElementById('chat-win').innerHTML = ''; currentMessages = []; appendBubble("أنا ميدو.. اؤمرني يا وحش!", 'bot'); }

    // Enter للارسال
    document.getElementById('msg-input').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    
    window.onload = createNewChat;
</script>
</body>
</html>
