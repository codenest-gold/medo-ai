<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ميدو AI | الإصدار المباشر</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #111; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app { width: 100%; max-width: 400px; background: #222; border-radius: 12px; display: flex; flex-direction: column; height: 80vh; border: 2px solid #d4af37; }
        #chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 8px; font-size: 14px; max-width: 85%; line-height: 1.5; }
        .user { background: #007bff; align-self: flex-end; }
        .bot { background: #333; align-self: flex-start; border-right: 3px solid #d4af37; }
        .input-box { display: flex; padding: 10px; background: #1a1a1a; border-top: 1px solid #444; }
        input { flex: 1; padding: 10px; border: none; border-radius: 5px; outline: none; background: #333; color: #fff; }
        button { background: #d4af37; color: #000; border: none; padding: 10px 15px; margin-right: 8px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <div id="chat"><div class="msg bot">جاهز يا سيادة الملازم. المفتاح سليم، هات أوامرك.</div></div>
    <div class="input-box">
        <input type="text" id="m-text" placeholder="اكتب هنا..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">إرسال</button>
    </div>
</div>

<script>
    const KEY = "AIzaSyDV-fIADKtlDtSGY9FBp7ZKyETpDvIf_So"; // مفتاحك المباشر

    async function sendMsg() {
        const inp = document.getElementById('m-text');
        const val = inp.value.trim();
        if(!val) return;
        
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div class="msg user">${val}</div>`;
        inp.value = "";
        
        const botMsg = document.createElement('div');
        botMsg.className = 'msg bot';
        botMsg.innerHTML = "جاري التنفيذ...";
        chat.appendChild(botMsg);
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: val + " (أجب باختصار بصفتك ميدو AI)" }] }] })
            });
            
            const data = await res.json();
            
            if (data.error) {
                // الكود هنا هيعرض الخطأ الحقيقي من جوجل مباشرة
                botMsg.innerHTML = `<span style="color:#ff4444">خطأ من السيرفر:</span> ${data.error.message}`;
            } else {
                botMsg.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
            }
        } catch (e) {
            botMsg.innerHTML = `<span style="color:#ff4444">خطأ في الشبكة:</span> تأكد من اتصالك.`;
        }
    }
</script>

</body>
</html>
