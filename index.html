<!doctype html>
<html lang="ar">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>شات بوت ذكي احترافي</title>
<style>
  :root{--bg:#f4f6f8;--card:#ffffff;--accent:#0b74de;--muted:#6b7280}
  body{font-family:Inter,Arial,Helvetica,sans-serif;background:var(--bg);margin:0;padding:20px;direction:rtl}
  .container{max-width:920px;margin:0 auto}
  .card{background:var(--card);border-radius:12px;padding:18px;box-shadow:0 6px 24px rgba(12,20,30,.06)}
  header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  header h1{margin:0;font-size:18px}
  #messages{height:62vh;overflow:auto;padding:12px;border-radius:10px;background:#fbfdff;border:1px solid #eef2f6}
  .row{display:flex;gap:8px;align-items:flex-end}
  .input{flex:1;display:flex;gap:8px}
  input[type="text"]{flex:1;padding:12px;border-radius:10px;border:1px solid #e6eef8;font-size:14px}
  button{background:var(--accent);color:#fff;border:none;padding:10px 14px;border-radius:10px;cursor:pointer}
  .msg{max-width:78%;padding:10px;border-radius:12px;margin:8px 0;position:relative;word-break:break-word}
  .user{margin-left:auto;background:linear-gradient(180deg,#e6f7ff,#dff3ff);border:1px solid #d0ecff}
  .bot{background:#f7f8fb;border:1px solid #eef0f6}
  .meta{font-size:12px;color:var(--muted);margin-top:6px}
  .small{font-size:12px;color:var(--muted)}
  .controls{display:flex;gap:8px;align-items:center;margin-top:10px}
  .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef6ff;color:#0353a4;font-size:12px}
  .typing{font-style:italic;color:var(--muted)}
  .conf{font-weight:600;color:#0b74de;margin-left:8px}
  .actions{margin-left:auto;display:flex;gap:8px}
  .danger{background:#ef4444}
  .file{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="card" role="region" aria-label="شات بوت ذكي احترافي">
    <header>
      <div>
        <h1>شات بوت ذكي</h1>
        <div class="small">يتعلم محلياً ويستدعي خادم الذكاء الاصطناعي عند الحاجة</div>
      </div>
      <div class="actions">
        <button id="exportBtn">تنزيل الذاكرة</button>
        <button id="importBtn">استيراد</button>
        <input id="fileInput" class="file" type="file" accept="application/json" />
        <button id="clearBtn" class="danger">مسح الذاكرة</button>
      </div>
    </header>

    <div id="messages" aria-live="polite"></div>

    <div class="row" style="margin-top:12px">
      <div class="input">
        <input id="text" type="text" placeholder="اكتب سؤالك..." autocomplete="off" />
        <button id="send">إرسال</button>
      </div>
      <div style="width:120px;text-align:left">
        <div class="badge" id="modeBadge">وضع: هجين</div>
      </div>
    </div>

    <div class="controls">
      <div class="small">مصدر محلي: إجابات محفوظة في جهازك؛ إذا لم توجد إجابة مناسبة يتم استدعاء الخادم.</div>
    </div>
  </div>
</div>

<script>
/* ===== إعدادات ===== */
const API_ENDPOINT = 'YOUR_API_ENDPOINT';
const DB_NAME = 'smart-chat-db-v2';
const STORE_NAME = 'qa_store';
const MAX_MEMORY = 1500;
const PROFANITY = ['نيك','كلمة_بذيئة_مثال']; // أضف كلمات أخرى حسب الحاجة
const PROFANITY_REPLACEMENT = '***';

/* ===== واجهة ===== */
const messagesEl = document.getElementById('messages');
const textEl = document.getElementById('text');
const sendBtn = document.getElementById('send');
const clearBtn = document.getElementById('clearBtn');
const exportBtn = document.getElementById('exportBtn');
const importBtn = document.getElementById('importBtn');
const fileInput = document.getElementById('fileInput');

function nowTime(){ return new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}); }
function renderMessage(text, cls, meta){
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.innerHTML = `<div>${escapeHtml(text)}</div><div class="meta">${nowTime()} ${meta? ' • ' + meta : ''}</div>`;
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function escapeHtml(s){ return s.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

/* ===== IndexedDB مساعد ===== */
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME,1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains(STORE_NAME)){
        const store = db.createObjectStore(STORE_NAME,{keyPath:'id',autoIncrement:true});
        store.createIndex('createdAt','createdAt',{unique:false});
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}
async function addRecord(record){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE_NAME,'readwrite');
    tx.objectStore(STORE_NAME).add(record).onsuccess = ()=>res();
    tx.oncomplete = ()=>db.close();
    tx.onerror = e => rej(e.target.error);
  });
}
async function getAllRecords(){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE_NAME,'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = ()=>{ res(req.result||[]); db.close(); };
    req.onerror = e => rej(e.target.error);
  });
}
async function clearAll(){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE_NAME,'readwrite');
    tx.objectStore(STORE_NAME).clear().onsuccess = ()=>res();
    tx.oncomplete = ()=>db.close();
    tx.onerror = e => rej(e.target.error);
  });
}

/* ===== تمثيل نصي وقياس تشابه محسّن ===== */
function tokenize(text){
  return text.toLowerCase().replace(/[^\p{L}\p{N}\s]+/gu,' ').split(/\s+/).filter(Boolean);
}
const STOPWORDS = new Set(['و','في','على','من','إلى','عن','هو','هي','هذا','هذه','ذلك','ما','لم','لن','لا','نعم','the','is','a','of','to','in','for','and']);
function termFreqVector(text){
  const tokens = tokenize(text).filter(t=>!STOPWORDS.has(t));
  const freqs = {};
  tokens.forEach(t=> freqs[t] = (freqs[t]||0)+1);
  return freqs;
}
function dotProduct(a,b){ let s=0; for(const k in a) if(b[k]) s+=a[k]*b[k]; return s; }
function magnitude(a){ let s=0; for(const k in a) s+=a[k]*a[k]; return Math.sqrt(s); }
function cosineSim(a,b){ const num=dotProduct(a,b); const den=magnitude(a)*magnitude(b); return den===0?0:num/den; }

/* ===== فلتر بذيئة بسيط ===== */
function sanitize(text){
  let t = text;
  for(const w of PROFANITY){
    const re = new RegExp('\\b'+escapeReg(w)+'\\b','ig');
    t = t.replace(re, PROFANITY_REPLACEMENT);
  }
  return t;
}
function escapeReg(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

/* ===== بحث محلي ذكي ===== */
async function findBestLocalMatch(query, threshold=0.62){
  const records = await getAllRecords();
  if(!records.length) return null;
  const qVec = termFreqVector(query);
  let best = null;
  for(const r of records){
    const rVec = r.vector || termFreqVector(r.q);
    const sim = cosineSim(qVec,rVec);
    if(!best || sim>best.sim) best = { record:r, sim };
  }
  if(best && best.sim >= threshold) return best;
  return null;
}

/* ===== استدعاء الخادم الوسيط ===== */
async function queryAPI(userText, contextRecords){
  const payload = { message: userText, context: contextRecords.slice(-8) };
  const res = await fetch(API_ENDPOINT, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  if(!res.ok) throw new Error('API error '+res.status);
  return res.json();
}

/* ===== إدارة الذاكرة ===== */
async function storeQA(q,a){
  const vector = termFreqVector(q);
  await addRecord({ q, a, vector, createdAt: Date.now() });
  const all = await getAllRecords();
  if(all.length > MAX_MEMORY){
    const sorted = all.sort((x,y)=>x.createdAt - y.createdAt);
    const toDelete = sorted.slice(0, all.length - MAX_MEMORY);
    const db = await openDB();
    const tx = db.transaction(STORE_NAME,'readwrite');
    const store = tx.objectStore(STORE_NAME);
    toDelete.forEach(item => store.delete(item.id));
    tx.oncomplete = ()=>db.close();
  }
}

/* ===== تفاعل المستخدم ===== */
sendBtn.addEventListener('click', onSend);
textEl.addEventListener('keydown', e=>{ if(e.key==='Enter') onSend(); });

async function onSend(){
  let text = textEl.value.trim();
  if(!text) return;
  text = sanitize(text);
  renderMessage(text, 'user');
  textEl.value = '';
  renderMessage('جارٍ البحث محلياً...', 'bot', 'حالة');

  try{
    const best = await findBestLocalMatch(text, 0.64);
    if(best){
      const conf = Math.round(best.sim*100);
      const meta = `مصدر: محلي • ثقة ${conf}%`;
      const lastBot = messagesEl.querySelector('.bot:last-child');
      if(lastBot) lastBot.innerHTML = `<div>${escapeHtml(best.record.a)}</div><div class="meta">${nowTime()} • ${meta}</div>`;
      return;
    }

    const lastBot = messagesEl.querySelector('.bot:last-child');
    if(lastBot) lastBot.innerHTML = `<div class="typing">جارٍ الاتصال بالخادم للحصول على إجابة ذكية...</div><div class="meta">${nowTime()}</div>`;

    const context = (await getAllRecords()).slice(-6).map(r=>({q:r.q,a:r.a}));
    const apiRes = await queryAPI(text, context);
    const answerRaw = apiRes.answer || 'عذراً، لم أتمكن من توليد إجابة.';
    const answer = sanitize(answerRaw);
    if(lastBot) lastBot.innerHTML = `<div>${escapeHtml(answer)}</div><div class="meta">${nowTime()} • مصدر: خادم</div>`;
    await storeQA(text, answer);
  }catch(err){
    const lastBot = messagesEl.querySelector('.bot:last-child');
    if(lastBot) lastBot.innerHTML = `<div>حدث خطأ في الاتصال بالخادم.</div><div class="meta">${nowTime()}</div>`;
    console.error(err);
  }
}

/* ===== أزرار مساعدة ===== */
clearBtn.addEventListener('click', async ()=>{
  if(!confirm('هل تريد مسح كل الذاكرة المحلية؟')) return;
  await clearAll();
  renderMessage('تم مسح الذاكرة المحلية.', 'bot');
});
exportBtn.addEventListener('click', async ()=>{
  const all = await getAllRecords();
  const blob = new Blob([JSON.stringify(all, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'chat_memory.json'; document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
});
importBtn.addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', async (e)=>{
  const f = e.target.files[0]; if(!f) return;
  const txt = await f.text();
  try{
    const arr = JSON.parse(txt);
    for(const item of arr) await addRecord(item);
    renderMessage('تم استيراد الذاكرة بنجاح.', 'bot');
  }catch(err){ renderMessage('ملف غير صالح.', 'bot'); }
});

/* ===== تهيئة ===== */
(async function init(){
  const recs = await getAllRecords();
  if(recs.length) renderMessage('تم تحميل الذاكرة المحلية. عدد السجلات: ' + recs.length, 'bot');
  else renderMessage('مرحباً! اسألني أي شيء. سأتعلم من المحادثات وأحاول الإجابة محلياً قبل الاتصال بالخادم.', 'bot');
})();
</script>
</body>
</html>
