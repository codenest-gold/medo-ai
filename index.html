<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDO AI v3.5 - النسخة الفاخرة المطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c084fc;
            --bg: #050507;
            --surface: #101014;
            --border: #22222a;
            --text: #ffffff;
            --user-bubble: linear-gradient(135deg, #7c3aed 0%, #c084fc 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .brand { padding: 25px; font-size: 24px; font-weight: 900; color: var(--primary); letter-spacing: 2px; text-align: center; border-bottom: 1px solid var(--border); }
        .chat-list { flex: 1; overflow-y: auto; padding: 15px; }
        .new-btn { margin: 15px; padding: 12px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .new-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Main Chat Area */
        .main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #111, #050507); }
        
        .chat-window { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 75%; padding: 15px 20px; border-radius: 20px; font-size: 16px; line-height: 1.6; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .bot { background: #1a1a22; align-self: flex-start; border-bottom-right-radius: 5px; border: 1px solid var(--border); }
        .user { background: var(--user-bubble); align-self: flex-end; border-bottom-left-radius: 5px; box-shadow: 0 5px 15px rgba(124, 58, 237, 0.3); }

        /* مكان الكتابة المطور - الميزة المطلوبة */
        .input-area {
            padding: 25px 40px;
            background: rgba(16, 16, 20, 0.95);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            gap: 15px;
            backdrop-filter: blur(10px);
        }

        .input-container {
            flex: 1;
            background: #1a1a22;
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 10px 15px;
            transition: 0.3s;
        }
        .input-container:focus-within { border-color: var(--primary); box-shadow: 0 0 10px rgba(192, 132, 252, 0.2); }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            font-size: 16px;
            max-height: 150px;
            min-height: 24px;
            outline: none;
            padding: 5px 0;
        }

        .send-btn {
            background: var(--primary);
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); background: #a855f7; }
        .send-btn svg { width: 24px; height: 24px; fill: currentColor; }

        /* القصيدة */
        .poem { text-align: center; color: #d8b4fe; font-style: italic; display: block; margin: 5px 0; }

        #typing { display: none; padding: 0 40px 10px; font-size: 13px; color: var(--primary); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand">MIDO AI</div>
    <button class="new-btn" onclick="location.reload()">+ محادثة جديدة</button>
    <div class="chat-list" id="chat-list"></div>
</div>

<div class="main">
    <div class="chat-window" id="chat-window">
        <div class="bubble bot">إيه يا زميلي.. نورت الشات الفخم. أنا ميدو، اؤمرني عايز ندردش ولا أرسم لك صورة من خيالك؟</div>
    </div>
    
    <div id="typing">ميدو بيفكر في الرد...</div>

    <div class="input-area">
        <div class="input-container">
            <textarea id="chat-in" placeholder="اكتب رسالتك هنا يا برنس..." rows="1" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" onclick="processInput()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    const chatIn = document.getElementById('chat-in');
    const chatWindow = document.getElementById('chat-window');

    // جعل مكان الكتابة يتمدد تلقائياً
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    // الرد بالقصيدة
    const poemResponse = `
        <span class="poem">سألوني مين اللي صنعك يا ميدو؟</span>
        <span class="poem">قلتلهم فنان، وعقله موش عادي..</span>
        <span class="poem">من شركة <b>Codenest</b>، أصله وجودة وجديدو،</span>
        <span class="poem">هو <b>"ميدو"</b>، العبقري، صاحب الأيادي..</span>
    `;

    async function processInput() {
        const val = chatIn.value.trim();
        if (!val) return;

        addMsg(val, 'user');
        chatIn.value = "";
        chatIn.style.height = 'auto';
        
        document.getElementById('typing').style.display = 'block';

        // الرد على سؤال "مين عملك"
        if (val.includes("مين عملك") || val.includes("من صنعك")) {
            setTimeout(() => {
                document.getElementById('typing').style.display = 'none';
                addMsg(poemResponse, 'bot', true);
            }, 1000);
            return;
        }

        // خاصية الرسم
        if (val.startsWith("ارسم") || val.startsWith("صورة")) {
            const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(val)}?width=1024&height=1024&nologo=true`;
            setTimeout(() => {
                document.getElementById('typing').style.display = 'none';
                addMsg(`<img src="${imgUrl}" style="width:100%; border-radius:10px; margin-top:10px;">`, 'bot', true);
            }, 2000);
            return;
        }

        // الرد العادي من الذكاء الاصطناعي
        try {
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(val)}?model=openai`);
            const text = await res.text();
            document.getElementById('typing').style.display = 'none';
            addMsg(text, 'bot');
        } catch (e) {
            document.getElementById('typing').style.display = 'none';
            addMsg("السيرفر هنج يا زميلي، جرب تاني.", 'bot');
        }
    }

    function addMsg(content, sender, isHtml = false) {
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        if (isHtml) div.innerHTML = content;
        else div.innerText = content;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // الإرسال بالإنتر (Enter)
    chatIn.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            processInput();
        }
    });
</script>

</body>
</html>
