<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميدو AI - العقل الهجين</title>
    <style>
        :root { --gold: #d4af37; --dark: #121212; --blue: #0078ff; --bot-msg: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }
        .mido-container { width: 450px; height: 750px; background: #fff; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.8); position: relative; }
        
        /* Header */
        .header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        .header h1 { margin: 0; color: var(--gold); font-size: 20px; text-shadow: 0 0 10px rgba(212,175,55,0.3); }
        .header span { color: #666; font-size: 9px; letter-spacing: 1px; display: block; }

        /* Chat Display */
        #display { flex: 1; background: #f0f2f5; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 14px; color: #333; line-height: 1.5; animation: slideUp 0.3s ease; position: relative; }
        .bot { background: var(--bot-msg); align-self: flex-start; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-right: 4px solid var(--gold); }
        .user { background: var(--blue); color: white; align-self: flex-end; border-left: 4px solid #0056b3; }
        .thinking { font-size: 12px; color: #888; font-style: italic; }

        /* Suggestion Buttons */
        .sugg-box { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .sugg-btn { background: #fff; border: 1px solid var(--gold); color: #8a6d0a; padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .sugg-btn:hover { background: var(--gold); color: #000; }

        /* Footer & Inputs */
        .footer { padding: 15px; background: white; border-top: 1px solid #eee; }
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; font-size: 14px; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 5px rgba(212,175,55,0.2); }
        
        .learn-panel { display: none; background: #fffcf0; padding: 15px; border-radius: 15px; border: 1px dashed var(--gold); margin-bottom: 10px; flex-direction: column; gap: 8px; }
        
        .btn-main { background: var(--gold); border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .mode-toggle { display: block; text-align: center; margin-top: 10px; font-size: 11px; color: var(--blue); cursor: pointer; font-weight: bold; text-decoration: underline; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="mido-container">
    <div class="header">
        <h1>ميدو AI (المحرك الهجين)</h1>
        <span>CODENEST GOLD • VERSION 5.0 PRO</span>
    </div>

    <div id="display"></div>

    <div class="footer">
        <div id="learn-panel" class="learn-panel">
            <input type="text" id="q-in" placeholder="س/ (السؤال المراد حفظه)">
            <input type="text" id="a-in" placeholder="ج/ (الإجابة المباشرة)">
            <button class="btn-main" onclick="saveToBrain()">حفظ في ذاكرتي ✅</button>
        </div>

        <div id="chat-ui" class="input-row">
            <input type="text" id="m-in" placeholder="اسألني أي شيء أو استرجع محفوظاتك..." onkeypress="if(event.key==='Enter') startLogic()">
            <button class="btn-main" onclick="startLogic()">إرسال</button>
        </div>

        <span class="mode-toggle" id="toggle-btn" onclick="toggleMode()">التبديل لوضع التعلم الذاتي 🎓</span>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyDO8qnXKN2cFHuIPbRQKmEqw9MVMzRGQBQ"; // تم دمج مفتاحك
    let db;
    let mode = "chat";

    // فتح قاعدة البيانات المحلية
    const request = indexedDB.open("MidoHybridDB", 1);
    request.onupgradeneeded = (e) => { e.target.result.createObjectStore("brain", { keyPath: "q" }); };
    request.onsuccess = (e) => { db = e.target.result; welcome(); };

    function welcome() {
        addMsg("أشكرك علي موقع ميدو Ai.. كيف حالك اليوم؟ أنا ميدو AI، تم تحديثي بمحرك <b>Gemini Pro</b> وبإمكاني الآن فهمك بشكل بشري كامل وحفظ أسرارك بدقة.", "bot");
    }

    function toggleMode() {
        mode = (mode === "chat") ? "learn" : "chat";
        document.getElementById('chat-ui').style.display = (mode === "chat") ? "flex" : "none";
        document.getElementById('learn-panel').style.display = (mode === "learn") ? "flex" : "none";
        document.getElementById('toggle-btn').innerText = (mode === "chat") ? "التبديل لوضع التعلم الذاتي 🎓" : "العودة للدردشة الذكية 💬";
    }

    function addMsg(txt, type) {
        const d = document.getElementById('display');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = txt;
        d.appendChild(div);
        d.scrollTop = d.scrollHeight;
        return div;
    }

    // --- حفظ المعلومات (وضع التعلم) ---
    async function saveToBrain() {
        const q = document.getElementById('q-in').value.trim().toLowerCase();
        const a = document.getElementById('a-in').value.trim();
        if(!q || !a) return;

        const tx = db.transaction("brain", "readwrite");
        tx.objectStore("brain").put({ q: q, a: a });
        tx.oncomplete = () => {
            addMsg(`تم حفظ المعلومة بنجاح. سأعطي الأولوية لـ "${a}" عند السؤال عن "${q}".`, "bot");
            document.getElementById('q-in').value = ""; document.getElementById('a-in').value = "";
            toggleMode();
        };
    }

    // --- المنطق الرئيسي للمعالجة ---
    async function startLogic() {
        const field = document.getElementById('m-in');
        const val = field.value.trim();
        if(!val) return;

        addMsg(val, "user");
        field.value = "";

        const thinking = addMsg("جاري التفكير...", "bot thinking");
        
        setTimeout(async () => {
            const lowerInput = val.toLowerCase();
            
            // 1. فحص المحفوظات أولاً (الأولوية للمحفوظ)
            const tx = db.transaction("brain", "readonly");
            const store = tx.objectStore("brain");
            const allReq = store.getAll();

            allReq.onsuccess = async () => {
                const data = allReq.result;
                
                // بحث عن تطابق كامل
                const exactMatch = data.find(item => item.q === lowerInput);
                if(exactMatch) {
                    thinking.remove();
                    addMsg(exactMatch.a, "bot");
                    return;
                }

                // بحث عن تطابق جزئي واقتراح
                const suggestions = data.filter(item => item.q.includes(lowerInput) || lowerInput.includes(item.q));
                if(suggestions.length > 0 && lowerInput.length > 2) {
                    thinking.remove();
                    addMsg("قصدك أي معلومة من دول؟", "bot");
                    const sBox = document.createElement('div');
                    sBox.className = "sugg-box";
                    suggestions.forEach(s => {
                        const btn = document.createElement('button');
                        btn.className = "sugg-btn";
                        btn.innerText = s.q;
                        btn.onclick = () => {
                            addMsg(s.q, "user");
                            const t = addMsg("لحظة...", "bot thinking");
                            setTimeout(() => { t.remove(); addMsg(s.a, "bot"); }, 1000);
                        };
                        sBox.appendChild(btn);
                    });
                    document.getElementById('display').appendChild(sBox);
                    return;
                }

                // 2. إذا لم يجد في المحفوظ، نستخدم الذكاء الاصطناعي الحقيقي (Gemini)
                try {
                    const aiResponse = await callGemini(val);
                    thinking.remove();
                    addMsg(aiResponse, "bot");
                } catch (err) {
                    thinking.remove();
                    addMsg("عذراً، حدث خطأ في الاتصال بالذكاء الاصطناعي، لكن يمكنني حفظ المعلومات يدوياً.", "bot");
                }
            };
        }, 2000);
    }

    // --- استدعاء Google Gemini API ---
    async function callGemini(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt + " (رد باللغة العربية بأسلوب ودود وذكاء)" }] }]
            })
        });
        const resData = await response.json();
        return resData.candidates[0].content.parts[0].text;
    }
</script>

</body>
</html>
